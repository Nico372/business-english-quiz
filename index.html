<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f4f1eb;color:#2c2c2c;padding:16px}
h1{text-align:center;font-size:1.4rem;margin-bottom:4px;color:#1a3a5c}
.subtitle{text-align:center;font-size:.9rem;color:#666;margin-bottom:24px}
.question{background:#fff;border-radius:10px;padding:16px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;transition:background .2s}
label:hover{background:#eef4ff}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-note{margin-top:8px;font-size:.85rem;color:#555;font-style:italic}
#score-box{background:#1a3a5c;color:#fff;border-radius:10px;padding:16px;text-align:center;font-size:1.2rem;margin-bottom:20px;display:none}
.btn{display:block;width:100%;max-width:320px;margin:0 auto 12px;padding:12px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-family:inherit}
#btn-validate{background:#1a3a5c;color:#fff}
#btn-reset{background:#6c757d;color:#fff;display:none}
</style>
</head>
<body>
<h1>📝 Quiz Business English du jour</h1>
<p class="subtitle">Négociation, validation & prise de décision — 6 questions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
{q:'Que signifie <em>"to push back"</em> ?',options:['Repousser une réunion à plus tard','Résister ou contester une idée','Déléguer une tâche à un collègue','Accélérer un processus'],correct:1},
{q:'Quelle expression utilises-tu pour soumettre une idée à quelqu\'un avant d\'agir ?',options:['To sign off on it','To give the green light','To run it by someone','To get buy-in'],correct:2},
{q:'Complète la phrase : <em>"The campaign can\'t go live until legal _____ _____ the copy."</em>',options:['gives the green light to','meets halfway on','signs off on','pushes back on'],correct:2},
{q:'Qu\'est-ce qu\'un <em>"deal-breaker"</em> ?',options:['Une bonne affaire à saisir','Une décision prise rapidement','Un accord conclu à l\'amiable','Un point non négociable pouvant faire échouer un accord'],correct:3},
{q:'Comment dit-on <strong>"obtenir l\'adhésion"</strong> en anglais ?',options:['To meet halfway','To give the green light','To get buy-in','To manage expectations'],correct:2},
{q:'Quelle est la différence entre <em>"See you soon"</em> et <em>"Speak soon"</em> ?',options:['Aucune différence, les deux sont interchangeables','<em>Speak soon</em> est plus formel et s\'utilise à l\'écrit','<em>See you soon</em> = en personne ; <em>Speak soon</em> = à distance','<em>See you soon</em> est réservé aux supérieurs hiérarchiques'],correct:2}
];

const quiz=document.getElementById('quiz');
const scoreBox=document.getElementById('score-box');
const btnValidate=document.getElementById('btn-validate');
const btnReset=document.getElementById('btn-reset');

function render(){
  quiz.innerHTML='';
  scoreBox.style.display='none';
  scoreBox.innerHTML='';
  btnValidate.style.display='block';
  btnReset.style.display='none';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Question ${i+1} — ${q.q}</p>`+q.options.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('')+'<div class="answer-note" id="note-'+i+'"></div>';
    quiz.appendChild(div);
  });
}

btnValidate.addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.options.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.correct){lbl.classList.add('correct');}
      else if(j===chosen&&chosen!==q.correct){lbl.classList.add('wrong');}
    });
    const note=document.getElementById('note-'+i);
    if(chosen===q.correct){score++;note.innerHTML='✅ Bonne réponse !';}
    else{note.innerHTML=`❌ Mauvaise réponse. La bonne réponse était : <strong>${q.options[q.correct]}</strong>`;}
  });
  if(!allAnswered){alert('Merci de répondre à toutes les questions avant de valider.');return;}
  scoreBox.innerHTML=`🎯 Score : ${score} / ${questions.length} — ${score===questions.length?'Parfait ! 🏆':score>=4?'Très bien ! 👍':'Continue tes efforts ! 💪'}`;
  scoreBox.style.display='block';
  scoreBox.scrollIntoView({behavior:'smooth'});
  btnValidate.style.display='none';
  btnReset.style.display='block';
});

btnReset.addEventListener('click',render);
render();
</script>
</body>
</html>
