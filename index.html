<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:6px;font-size:1.4em}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;transition:background .2s}
label:hover{background:#eef3f8}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important}
.wrong{background:#f8d7da!important;border-color:#dc3545!important}
.answer-info{margin-top:8px;font-size:.88em;padding:6px 10px;border-radius:5px;background:#fff8e1;border-left:4px solid #e07b00}
#score-box{text-align:center;background:#2c5f8a;color:#fff;padding:16px;border-radius:10px;margin-bottom:20px;font-size:1.2em;display:none}
.btn{display:block;width:100%;max-width:340px;margin:10px auto;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#c06a00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Créativité & Innovation — 6 questions sur les expressions du jour</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"blue-sky thinking"</em> ?',
    opts:['Planifier des scénarios de crise','Réfléchir librement, sans contraintes','Revoir la stratégie outdoor d\'une campagne','Analyser les résultats d\'une campagne passée'],
    ans:1
  },
  {
    q:'Quelle expression signifie <em>« lancer des idées spontanément »</em> ?',
    opts:['To flesh something out','To bounce ideas off someone','To pivot','To spitball'],
    ans:3
  },
  {
    q:'Complétez la phrase : "The concept is promising but rough — can the team ________ before Thursday?"',
    opts:['pivot it','call it a day','flesh it out','spitball it'],
    ans:2
  },
  {
    q:'Que signifie <em>"North Star"</em> dans un contexte business ?',
    opts:['Un détail mineur de l\'exécution créative','L\'objectif directeur global d\'une stratégie','Une réunion de bilan en fin de campagne','Un outil de navigation pour les présentations'],
    ans:1
  },
  {
    q:'Quelle expression signifie <em>« vue d\'ensemble, vision globale »</em> ?',
    opts:['North Star','To think outside the box','Big picture','Blue-sky thinking'],
    ans:2
  },
  {
    q:'Complétez : "Sorry to cut this short — ________, I have back-to-back calls."',
    opts:['let\'s call it a day','I\'m off','gotta bounce','let\'s pivot'],
    ans:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Question ${i+1} : ${q.q}</p>`+
      q.opts.map((o,j)=>`<label id="lbl_${i}_${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.appendChild(div);
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl_${i}_${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans){lbl.className='correct';}
      else if(j===chosen&&chosen!==q.ans){lbl.className='wrong';}
    });
    let info=document.createElement('div');
    info.className='answer-info';
    if(chosen===q.ans){
      score++;
      info.innerHTML='✅ Bonne réponse !';
    } else {
      info.innerHTML=`❌ Mauvaise réponse. La bonne réponse était : <strong>${q.opts[q.ans]}</strong>`;
    }
    document.querySelectorAll('.question')[i].appendChild(info);
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  let emoji=pct===100?'🏆':pct>=80?'🎯':pct>=50?'👍':'💪';
  box.innerHTML=`${emoji} Votre score : <strong>${score} / ${questions.length}</strong> (${pct}%)`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-reset').addEventListener('click',render);
render();
</script>
</body>
</html>
