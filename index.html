<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;font-size:1.4em;margin-bottom:8px}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;border:1px solid #ddd;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.88em;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.2em;margin-bottom:16px;display:none}
button{display:block;width:100%;max-width:340px;margin:0 auto 12px;padding:12px;border:none;border-radius:6px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#c06a00}
</style>
</head>
<body>
<h1>📊 Quiz Business English du jour</h1>
<p class="subtitle">Thème : Media, Marketing &amp; Agency Vocabulary</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button id="btn-validate" onclick="validate()">Valider mes réponses</button>
<button id="btn-reset" onclick="reset()">🔄 Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"cutdowns"</em> dans un contexte de production ?',
    opts:['Des réductions budgétaires sur une campagne','Des versions courtes d\'un film long pour différents formats','Des scripts édités envoyés au client pour validation','Des briefs créatifs abrégés'],
    ans:1
  },
  {
    q:'Que signifie <em>"CPM"</em> et que mesure-t-il ?',
    opts:['Cost Per Month — le budget mensuel alloué à un canal','Cost Per Mille — le coût pour 1 000 impressions','Campaign Performance Metric — le score global de la campagne','Cost Per Message — le coût d\'un message publicitaire'],
    ans:1
  },
  {
    q:'Complétez : "We need to review the ________ — the client feels we\'re too TV-heavy and wants more digital."',
    opts:['touchpoint','KPI','media mix','ROI'],
    ans:2
  },
  {
    q:'Quelle expression signifie <strong>"faire un effort supplémentaire"</strong> ?',
    opts:['All hands on deck','To walk the talk','To go the extra mile','To break the ice'],
    ans:2
  },
  {
    q:'Qu\'est-ce qu\'un <em>"touchpoint"</em> ?',
    opts:['Un format de publicité digitale','Un moment ou canal où une marque interagit avec un consommateur','Une diapositive dans une présentation client','Un indicateur de performance'],
    ans:1
  },
  {
    q:'Vrai ou Faux : <em>"ATL"</em> (above the line) désigne des canaux ciblés et à réponse directe comme l\'e-mail ou l\'activation en magasin.',
    opts:['Vrai — ATL couvre les canaux directs et personnalisés','Faux — ATL désigne les canaux mass-market comme la TV, la radio et l\'affichage','Vrai — ATL et BTL sont interchangeables','Faux — ATL ne concerne que le digital'],
    ans:1
  },
  {
    q:'Que signifie <em>"all hands on deck"</em> ?',
    opts:['La réunion est reportée','Le projet est annulé','Tout le monde doit s\'impliquer et aider','Le budget a été approuvé'],
    ans:2
  },
  {
    q:'Complétez : "Before we present, let\'s align on the campaign ________ — the client\'s team and CFO define success very differently."',
    opts:['cutdowns','ROI','media mix','KPIs'],
    ans:3
  },
  {
    q:'Quelle est la différence entre <em>"reach"</em> et <em>"frequency"</em> en media planning ?',
    opts:['Ce sont deux termes synonymes en planification média','Reach = combien de personnes différentes voient le message ; Frequency = combien de fois chaque personne le voit','Reach = nombre de clics ; Frequency = nombre d\'impressions','Reach = budget total ; Frequency = coût par contact'],
    ans:1
  },
  {
    q:'Complétez : "It\'s easy to talk about being client-centric, but we need to ________ the ________ starting with how we run our status calls."',
    opts:['break / ice','go / extra mile','walk / talk','set / tone'],
    ans:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    let html=`<div class="question" id="q${i}"><p>${i+1}. ${q.q}</p>`;
    q.opts.forEach((o,j)=>{
      html+=`<label id="lbl${i}_${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`;
    });
    html+='<div class="answer-info" id="info'+i+'" style="display:none"></div>';
    html+='</div>';
    quiz.innerHTML+=html;
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;}
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const chosen=parseInt(sel.value);
    const correct=q.ans;
    const info=document.getElementById('info'+i);
    // disable all
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl${i}_${j}`);
      lbl.querySelector('input').disabled=true;
      if(j===correct) lbl.classList.add('correct');
      if(j===chosen && chosen!==correct) lbl.classList.add('wrong');
    });
    info.style.display='block';
    if(chosen===correct){
      score++;
      info.textContent='✅ Bonne réponse !';
      info.style.color='#155724';
    } else {
      info.textContent='❌ Mauvaise réponse. La bonne réponse est : '+q.opts[correct];
      info.style.color='#721c24';
    }
  });
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  let emoji= pct>=80?'🎉':pct>=50?'👍':'💪';
  box.innerHTML=`${emoji} Votre score : <strong>${score} / ${questions.length}</strong> (${pct}%)`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
