<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;font-size:1.4em;margin-bottom:6px;text-align:center}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;font-size:.97em}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;border:1px solid #ddd;font-size:.93em}
label:hover{background:#eef3fb}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.88em;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.2em;font-weight:bold;margin-bottom:16px;display:none}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:7px;font-size:1em;cursor:pointer;font-weight:bold;margin-bottom:10px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#245079}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#c06a00}
</style>
</head>
<body>
<h1>Quiz Business English du jour</h1>
<p class="subtitle">Créativité &amp; Idéation — 6 questions, 10 expressions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
{q:'Que signifie <em>"blue-sky thinking"</em> ?',options:['Réfléchir à de la publicité extérieure','Une réflexion sans contraintes ni limites','Une révision de la stratégie médias','Un plan de lancement de produit'],answer:1},
{q:'Complétez : <em>"Can I ________ a few ideas ________ you before I finalise the deck?"</em>',options:['put / forward','flesh / out','bounce / off','call / off'],answer:2},
{q:'Quelle expression signifie <em>donner du corps à une idée</em> ?',options:['To spitball','To think outside the box','To put ideas on the table','To flesh something out'],answer:3},
{q:'Que signifie <em>"North Star"</em> dans un contexte professionnel ?',options:["Un livrable mineur d'un projet",'Un objectif directeur qui guide toutes les décisions','Un indicateur de performance secondaire','Le nom d\'un outil de gestion de projet'],answer:1},
{q:'<em>"Gotta bounce"</em> est-il approprié lors d\'une réunion formelle avec un client ?',options:['Oui, c\'est une expression neutre','Oui, si la réunion se passe bien','Non, c\'est une expression informelle/familière','Non, car ça signifie annuler la réunion'],answer:2},
{q:'Quelle expression utiliser pour encourager tout le monde à proposer librement des idées sans jugement ?',options:['North Star','Let\'s call it a day','Let\'s put ideas on the table','Big picture'],answer:2}
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Q${i+1}. ${q.q}</p>`+q.options.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.appendChild(div);
  });
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.options.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.answer){lbl.classList.add('correct');}
      else if(j===chosen&&chosen!==q.answer){lbl.classList.add('wrong');}
    });
    if(chosen===q.answer){score++;}
    else{
      const info=document.createElement('div');
      info.className='answer-info';
      info.textContent='✅ Bonne réponse : '+q.options[q.answer];
      document.querySelector(`input[name="q${i}"]`).closest('.question').appendChild(info);
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  box.textContent=`Votre score : ${score} / ${questions.length} ${score===questions.length?'🎉':score>=4?'👍':'💪'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
});

render();
</script>
</body>
</html>
