<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:8px;font-size:1.4em}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;color:#155724;border:1px solid #c3e6cb}
.wrong{background:#f8d7da!important;color:#721c24;border:1px solid #f5c6cb}
.answer-note{font-size:.88em;margin-top:8px;padding:6px 10px;background:#fff3cd;border-radius:4px;color:#856404}
#score-box{text-align:center;background:#2c5f8a;color:#fff;padding:16px;border-radius:8px;margin-bottom:16px;font-size:1.2em;font-weight:bold}
.btn{display:block;width:100%;max-width:320px;margin:10px auto;padding:13px;border:none;border-radius:6px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b85f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Idioms &amp; Expressions for Everyday Office Life — 6 questions</p>
<div id="score-box" style="display:none"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"a no brainer"</em> ?',
    options:['Quelque chose de très complexe','Quelque chose d\'évident qui ne demande aucune réflexion','Une mauvaise décision','Un concept difficile à expliquer'],
    answer:1
  },
  {
    q:'Quelle expression correspond à <em>"faire d\'une pierre deux coups"</em> ?',
    options:['Back to square one','Game changer','Kill two birds with one stone','A blessing in disguise'],
    answer:2
  },
  {
    q:'Complétez : <em>"The research results give us a lot of ________ — we need to rethink our media strategy."</em>',
    options:['game changer','consider it done','food for thought','so far so good'],
    answer:2
  },
  {
    q:'Que signifie <em>"a blessing in disguise"</em> en français ?',
    options:['Une chance évidente','Un mal pour un bien','Un problème insurmontable','Un avantage compétitif'],
    answer:1
  },
  {
    q:'<em>"Back to square one"</em> signifie que l\'équipe a fait de grands progrès. Vrai ou Faux ?',
    options:['Vrai — l\'équipe avance bien','Faux — cela signifie recommencer depuis le début','Vrai — c\'est une expression positive','Faux — cela signifie qu\'on attend des instructions'],
    answer:1
  },
  {
    q:'Votre manager vous demande de gérer une demande client urgente et vous voulez le rassurer. Quelle expression utilisez-vous ?',
    options:['So far so good','Food for thought','Consider it done','Game changer'],
    answer:2
  }
];

const quiz=document.getElementById('quiz');
const btnValidate=document.getElementById('btn-validate');
const btnReset=document.getElementById('btn-reset');
const scoreBox=document.getElementById('score-box');

function render(){
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Q${i+1}. ${q.q}</p>`+q.options.map((o,j)=>`
      <label id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}"> ${o}
      </label>`).join('');
    quiz.appendChild(div);
  });
}

btnValidate.addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    for(let j=0;j<q.options.length;j++){
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      if(j===q.answer){lbl.classList.add('correct');}
      else if(j===chosen&&chosen!==q.answer){lbl.classList.add('wrong');}
    }
    // disable
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    if(chosen===q.answer){score++;}
    else{
      const note=document.createElement('div');
      note.className='answer-note';
      note.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.answer]}</strong>`;
      document.querySelector(`.question:nth-child(${i+1})`).appendChild(note);
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  scoreBox.style.display='block';
  scoreBox.textContent=`Votre score : ${score} / ${questions.length} ${score===questions.length?'🎉 Parfait !':score>=4?'👍 Bien joué !':'💪 Continuez !'}`;
  btnValidate.style.display='none';
  btnReset.style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});

btnReset.addEventListener('click',()=>{
  scoreBox.style.display='none';
  btnValidate.style.display='block';
  btnReset.style.display='none';
  render();
});

render();
</script>
</body>
</html>
