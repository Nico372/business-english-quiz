<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{text-align:center;color:#2c5f8a;font-size:1.4em;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:7px 10px;margin-bottom:6px;border-radius:5px;cursor:pointer;border:1px solid #ddd;font-size:.95em;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-note{margin-top:8px;font-size:.85em;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;text-align:center;padding:14px;border-radius:8px;font-size:1.2em;font-weight:bold;margin-bottom:16px;display:none}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold;margin-bottom:10px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#c06a00}
</style>
</head>
<body>
<h1>📝 Quiz Business English du jour</h1>
<p class="subtitle">Timing &amp; Deadlines — 6 questions, 10 expressions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"We\'re in crunch time"</em> ?',
    options:["L'équipe est en avance sur le planning","Nous sommes dans la phase finale et très intense d'un projet","La réunion a dépassé son temps imparti","Le projet a été annulé"],
    answer:1
  },
  {
    q:'Quelle expression signifie <strong>"fin de journée"</strong> comme délai ?',
    options:["ASAP","EOW","At your earliest convenience","EOD"],
    answer:3
  },
  {
    q:'Complétez : "Please send me your availability ________ — I\'d like to schedule a call before the end of the week."',
    options:["down to the wire","in the nick of time","at your earliest convenience","ahead of schedule"],
    answer:2
  },
  {
    q:'Vrai ou faux : <strong>"Ahead of schedule"</strong> signifie que le projet est en retard.',
    options:["Vrai — le projet est en retard","Faux — cela signifie que le projet avance plus vite que prévu","Vrai — le planning a été décalé","Faux — cela signifie que le projet est à l'arrêt"],
    answer:1
  },
  {
    q:'Que signifie <strong>"time is of the essence"</strong> ?',
    options:["Il y a beaucoup de temps devant nous","Le délai est flexible","Le délai est critique et ne peut pas être manqué","Il faut prendre son temps pour bien faire"],
    answer:2
  },
  {
    q:'Quelle expression de révision désigne <strong>"un signal d\'alarme"</strong> indiquant un problème potentiel ?',
    options:["Bottleneck","To backfire","Red flag","Down to the wire"],
    answer:2
  }
];

function render(){
  const container=document.getElementById('quiz');
  container.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Question ${i+1} / ${questions.length} — ${q.q}</p>`;
    q.options.forEach((opt,j)=>{
      const id=`q${i}_o${j}`;
      div.innerHTML+=`<label id="lbl_${i}_${j}"><input type="radio" name="q${i}" value="${j}" id="${id}"> ${opt}</label>`;
    });
    container.appendChild(div);
  });
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    // disable all
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    q.options.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl_${i}_${j}`);
      if(j===q.answer){lbl.classList.add('correct');}
      else if(j===chosen&&chosen!==q.answer){lbl.classList.add('wrong');}
    });
    if(chosen===q.answer){
      score++;
    } else {
      const qDiv=document.querySelectorAll('.question')[i];
      const note=document.createElement('div');
      note.className='answer-note';
      note.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.answer]}</strong>`;
      qDiv.appendChild(note);
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const emoji=score===6?'🏆':score>=4?'👍':score>=2?'💪':'📚';
  box.textContent=`${emoji} Votre score : ${score} / ${questions.length}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
});

render();
</script>
</body>
</html>
