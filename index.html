<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;font-size:1.3em;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;font-size:.95em}
label{display:block;padding:7px 10px;margin-bottom:5px;border-radius:5px;cursor:pointer;font-size:.9em;border:1px solid #ddd;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.85em;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.1em;margin-bottom:16px;display:none}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:6px}
button{padding:11px 24px;border:none;border-radius:6px;cursor:pointer;font-size:1em;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-restart{background:#e07b00;color:#fff;display:none}
button:hover{opacity:.88}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Meetings &amp; Collaboration — 6 questions sur les 10 expressions du jour</p>
<div id="score-box"></div>
<div id="quiz"></div>
<div class="btns">
  <button id="btn-validate">Valider mes réponses</button>
  <button id="btn-restart">Recommencer</button>
</div>
<script>
const questions=[
  {
    q:"Que signifie <em>\"action items\"</em> dans le contexte d'une réunion ?",
    options:["Des éléments du menu de déjeuner","Des tâches précises assignées à des personnes, avec des délais","Des slides à mettre à jour après l'appel","Des points à soulever lors du prochain meeting"],
    answer:1
  },
  {
    q:"Complétez la phrase : \"That's a very detailed question — let's ________ this ________ and set up a separate call.\"",
    options:["park / now","circle / back","take / offline","push / forward"],
    answer:2
  },
  {
    q:"Quelle expression utiliseriez-vous pour résumer les points clés à retenir après une réunion ?",
    options:["Action items","Fair enough","Takeaways","My bad"],
    answer:2
  },
  {
    q:"Que signifie <em>\"to your point\"</em> ?",
    options:["Pour introduire un sujet totalement nouveau","Pour rebondir sur ce que vient de dire l'interlocuteur","Pour contredire poliment quelqu'un","Pour clore une discussion"],
    answer:1
  },
  {
    q:"Complétez : \"________ — I forgot to include the legal team in the email chain. I'll loop them in now.\"",
    options:["Fair enough","Does that work","My bad","To your point"],
    answer:2
  },
  {
    q:"Que signifie <em>\"elevator pitch\"</em> ?",
    options:["Une présentation d'au moins une heure","Un pitch livré uniquement à un PDG","Un résumé bref et percutant d'une idée en 30 secondes","Un appel d'offres remporté grâce à une bonne présentation"],
    answer:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Q${i+1}. ${q.q}</p>`+q.options.map((opt,j)=>`
      <label id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}"> ${opt}
      </label>`).join('');
    quiz.appendChild(div);
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='inline-block';
  document.getElementById('btn-restart').style.display='none';
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.options.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.answer){lbl.className='correct';}
      else if(j===chosen&&chosen!==q.answer){lbl.className='wrong';}
    });
    // add answer info
    const div=document.querySelector(`#lbl-${i}-${q.answer}`).parentElement;
    let info=div.querySelector('.answer-info');
    if(!info){
      info=document.createElement('div');
      info.className='answer-info';
      div.appendChild(info);
    }
    if(chosen===q.answer){
      score++;
      info.textContent='✅ Bonne réponse !';
    } else {
      info.textContent=`❌ Bonne réponse : ${q.options[q.answer]}`;
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const emoji=score===6?'🏆':score>=4?'👍':'💪';
  box.innerHTML=`${emoji} Votre score : <strong>${score} / ${questions.length}</strong> — ${score===6?'Parfait !':score>=4?'Très bien !':score>=2?'Continuez vos efforts !':'Révisez les expressions et réessayez !'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-restart').style.display='inline-block';
});

document.getElementById('btn-restart').addEventListener('click',render);

render();
</script>
</body>
</html>
