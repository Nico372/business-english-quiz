<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{text-align:center;color:#1a3a5c;font-size:1.4rem;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9rem;margin-bottom:20px}
.question-block{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.question-text{font-weight:600;margin-bottom:10px;font-size:.95rem;line-height:1.4}
.options label{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:.9rem;margin-bottom:5px;border:1.5px solid #e0e6ee;transition:background .15s}
.options label:hover{background:#eef3fb}
.options input[type=radio]{margin-top:3px;accent-color:#1a3a5c;flex-shrink:0}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.feedback{font-size:.82rem;margin-top:8px;padding:6px 10px;border-radius:6px;background:#fff8e1;border-left:4px solid #f0ad4e;color:#5a4000}
.btn{display:block;width:100%;max-width:320px;margin:18px auto 6px;padding:12px;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
#btnValidate{background:#1a3a5c;color:#fff}
#btnValidate:hover{background:#24527a}
#btnReset{background:#e2e8f0;color:#1a3a5c;display:none}
#btnReset:hover{background:#cdd5e0}
#score-box{text-align:center;background:#fff;border-radius:10px;padding:14px;margin-bottom:10px;font-size:1.1rem;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.08);display:none}
.score-good{color:#155724}
.score-mid{color:#856404}
.score-bad{color:#721c24}
em{color:#1a3a5c}
</style>
</head>
<body>
<h1>🎓 Quiz Business English du jour</h1>
<p class="subtitle">Thème : Gérer le temps, recentrer et clore une réunion</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btnValidate">Valider mes réponses</button>
<button class="btn" id="btnReset">🔄 Recommencer</button>
<script>
const questions = [
  {
    q: "1. Que signifie <em>\"To circle back\"</em> ?",
    opts: [
      "Tourner en rond sans avancer",
      "Revenir sur un sujet plus tard",
      "Conclure une réunion immédiatement",
      "Faire une pause et reprendre demain"
    ],
    correct: 1,
    explanation: "<em>To circle back</em> = faire une boucle et revenir sur un point quand on a plus d'informations ou de temps."
  },
  {
    q: "2. Quelle expression utiliserais-tu pour dire poliment <strong>« mettons ce sujet en pause »</strong> ?",
    opts: [
      "Let's call it a day",
      "To run overtime",
      "Can we put a pin in that?",
      "To loop back"
    ],
    correct: 2,
    explanation: "<em>Can we put a pin in that?</em> est la façon la plus diplomatique de mettre un sujet en pause sans le rejeter."
  },
  {
    q: "3. Complète la phrase : <em>\"We've been here two hours and we're really starting to ________ ________. Let's wrap up.\"</em>",
    opts: [
      "loop back",
      "call it a day",
      "put a pin",
      "run overtime"
    ],
    correct: 3,
    explanation: "<em>To run overtime</em> = dépasser l'horaire prévu. C'est l'expression idéale pour signaler qu'une réunion s'éternise."
  },
  {
    q: "4. Complète la phrase : <em>\"Before we end, here are the ________ ________: Claire will finalize the deck, and I'll send the timeline by EOD.\"</em>",
    opts: [
      "action items",
      "loop backs",
      "pin points",
      "circle notes"
    ],
    correct: 0,
    explanation: "<em>Action items</em> = les tâches concrètes qui ressortent d'une réunion, ce que chacun doit accomplir."
  },
  {
    q: "5. Quelle est la différence culturelle importante avec <em>\"to table something\"</em> ?",
    opts: [
      "Cela signifie toujours reporter le sujet, partout dans le monde",
      "Aux États-Unis : reporter ; au Royaume-Uni : mettre à l'ordre du jour",
      "Aux États-Unis : mettre à l'ordre du jour ; au Royaume-Uni : reporter",
      "Cette expression est exclusivement britannique"
    ],
    correct: 1,
    explanation: "Piège culturel ! <em>To table</em> = reporter en anglais américain, mais = mettre à l'ordre du jour en anglais britannique."
  },
  {
    q: "6. Quelle expression emploierais-tu pour dire <strong>« arrêtons pour aujourd'hui »</strong> en fin de réunion ?",
    opts: [
      "Let's postpone the meeting",
      "Can we put a pin in that?",
      "To your point",
      "Let's call it a day"
    ],
    correct: 3,
    explanation: "<em>Let's call it a day</em> = arrêtons pour aujourd'hui. Parfait pour clore une réunion ou une journée de travail."
  }
];

function render() {
  const quiz = document.getElementById('quiz');
  quiz.innerHTML = '';
  questions.forEach((q, i) => {
    const block = document.createElement('div');
    block.className = 'question-block';
    block.id = 'q' + i;
    let optsHTML = '';
    q.opts.forEach((opt, j) => {
      optsHTML += `<label id="lbl${i}_${j}">
        <input type="radio" name="q${i}" value="${j}"> ${opt}
      </label>`;
    });
    block.innerHTML = `<div class="question-text">${q.q}</div>
      <div class="options" id="opts${i}">${optsHTML}</div>`;
    quiz.appendChild(block);
  });
}

function validate() {
  let score = 0;
  let allAnswered = true;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const block = document.getElementById('q' + i);
    let feedback = block.querySelector('.feedback');
    if (feedback) feedback.remove();
    if (!selected) { allAnswered = false; return; }
    const val = parseInt(selected.value);
    const labels = block.querySelectorAll('label');
    labels.forEach((lbl, j) => {
      lbl.classList.remove('correct', 'wrong');
      const inp = lbl.querySelector('input');
      inp.disabled = true;
      if (j === q.correct) lbl.classList.add('correct');
      else if (j === val && val !== q.correct) lbl.classList.add('wrong');
    });
    if (val === q.correct) {
      score++;
    } else {
      const fb = document.createElement('div');
      fb.className = 'feedback';
      fb.innerHTML = '💡 ' + q.explanation;
      block.appendChild(fb);
    }
  });
  if (!allAnswered) {
    alert('⚠️ Merci de répondre à toutes les questions avant de valider.');
    return;
  }
  const box = document.getElementById('score-box');
  box.style.display = 'block';
  let cls = score >= 5 ? 'score-good' : score >= 3 ? 'score-mid' : 'score-bad';
  let msg = score === 6 ? '🏆 Parfait !' : score >= 4 ? '👍 Bien joué !' : '💪 Continue à t\'entraîner !';
  box.innerHTML = `<span class="${cls}">Score : ${score} / ${questions.length} — ${msg}</span>`;
  document.getElementById('btnValidate').style.display = 'none';
  document.getElementById('btnReset').style.display = 'block';
  box.scrollIntoView({behavior:'smooth'});
}

function reset() {
  document.getElementById('score-box').style.display = 'none';
  document.getElementById('btnValidate').style.display = 'block';
  document.getElementById('btnReset').style.display = 'none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('btnValidate').addEventListener('click', validate);
document.getElementById('btnReset').addEventListener('click', reset);
render();
</script>
</body>
</html>
