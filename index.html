<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;font-size:1.4em;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.q-num{font-weight:bold;color:#2c5f8a;margin-bottom:8px;font-size:.95em}
.q-text{margin-bottom:10px;font-size:.95em;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;font-size:.9em;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-note{font-size:.85em;margin-top:6px;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:10px;padding:16px;text-align:center;font-size:1.2em;font-weight:bold;margin-bottom:16px;display:none}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:1em;font-weight:bold;cursor:pointer;margin-bottom:10px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b85f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Idioms &amp; Proverbs — 6 questions sur les expressions du jour</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">✅ Valider mes réponses</button>
<button class="btn" id="btn-reset">🔄 Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <strong>"to go round in circles"</strong> ?',
    options:['Progresser régulièrement vers un objectif','Débattre sans jamais parvenir à une décision','Alterner les responsabilités au sein de l\'équipe','Faire des réunions courtes et efficaces'],
    answer:1
  },
  {
    q:'Quelle expression signifie <em>aller droit au but</em> ?',
    options:['First things first','The ball is in his court','Let\'s cut to the chase','To learn the ropes'],
    answer:2
  },
  {
    q:'Complétez : <em>"Don\'t ________ about the rebrand — the announcement isn\'t until Thursday."</em>',
    options:['skate on thin ice','spill the beans','take one for the team','go round in circles'],
    answer:1
  },
  {
    q:'Que signifie <strong>"to skate on thin ice"</strong> ?',
    options:['Travailler efficacement sous pression','S\'aventurer sur un terrain risqué ou délicat','Apprendre les ficelles du métier','Tenir quelqu\'un informé en temps réel'],
    answer:1
  },
  {
    q:'Quelle expression signifie <em>ne pas être au courant</em> ?',
    options:['To keep someone posted','To loop someone in','To be out of the loop','To take one for the team'],
    answer:2
  },
  {
    q:'Complétez : <em>"I\'ve been travelling all week — can someone ________ me ________ on the project status?"</em>',
    options:['loop … out','cut … through','keep … posted','bring … around'],
    answer:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="q-num">Question ${i+1} / ${questions.length}</div><div class="q-text">${q.q}</div>`+
      q.options.map((opt,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`).join('');
    quiz.appendChild(card);
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.options.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.answer){lbl.className='correct';}
      else if(j===chosen&&chosen!==q.answer){lbl.className='wrong';}
    });
    if(chosen===q.answer)score++;
    // show answer note if wrong
    if(chosen!==q.answer){
      const note=document.createElement('div');
      note.className='answer-note';
      note.textContent='✔ Bonne réponse : '+q.options[q.answer];
      document.querySelector(`input[name="q${i}"]`).closest('.card').appendChild(note);
    }
  });
  if(!allAnswered){alert('Merci de répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  let emoji=pct===100?'🏆':pct>=50?'👍':'💪';
  box.textContent=`${emoji} Votre score : ${score} / ${questions.length} (${pct}%)`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('btn-validate').addEventListener('click',validate);
document.getElementById('btn-reset').addEventListener('click',reset);
render();
</script>
</body>
</html>
