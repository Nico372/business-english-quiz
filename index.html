<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:8px;font-size:1.4em}
p.sub{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.card p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;border:1px solid #ddd;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-note{margin-top:8px;font-size:.88em;color:#2c5f8a;font-weight:bold}
#score-box{background:#2c5f8a;color:#fff;border-radius:10px;padding:16px;text-align:center;margin-bottom:16px;font-size:1.2em;font-weight:bold}
button{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;margin-bottom:10px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b86200}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="sub">Thème : Email &amp; Communication Essentials — 6 questions</p>
<div id="score-box" style="display:none"></div>
<div id="quiz"></div>
<button id="btn-validate" onclick="validate()">✅ Valider mes réponses</button>
<button id="btn-reset" onclick="reset()">🔄 Recommencer</button>
<script>
const questions=[
  {q:'Que signifie <em>"I\'m all ears"</em> ?',opts:["Je suis trop occupé pour écouter","Je suis prêt et j'écoute attentivement","J'ai déjà entendu cela avant","Je n'entends pas bien"],ans:1},
  {q:'Complétez : "_________ our conversation last Tuesday, here is the updated media plan."',opts:["Looking back on","Checking in on","Following up on","Catching up on"],ans:2},
  {q:'Quelle expression signifie <em>"envoyer un message rapide"</em> ?',opts:["To sync up","To give someone a shout","To be on the same page","To drop someone a line"],ans:3},
  {q:'Que signifie <em>"Let\'s call it a day"</em> ?',opts:["Planifions une réunion demain","Concentrons-nous sur aujourd\'hui","Arrêtons de travailler pour aujourd\'hui","Appelons-nous dans la journée"],ans:2},
  {q:'Complétez : "Can we ________ ________ for 20 minutes before the board meeting?"',opts:["catch / up","line / up","hook / up","sync / up"],ans:3},
  {q:'Quelle expression utiliseriez-vous pour dire à un collègue que vous partez rapidement d\'une réunion ?',opts:["Let\'s call it a day","Just checking","Gotta bounce","Thanks for the heads-up"],ans:2}
];

function render(){
  const div=document.getElementById('quiz');
  div.innerHTML='';
  questions.forEach((q,i)=>{
    let opts=q.opts.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    div.innerHTML+=`<div class="card" id="card-${i}"><p>Q${i+1}. ${q.q}</p>${opts}<div class="answer-note" id="note-${i}" style="display:none"></div></div>`;
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    const note=document.getElementById(`note-${i}`);
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans) lbl.classList.add('correct');
      if(j===chosen && chosen!==q.ans) lbl.classList.add('wrong');
    });
    note.style.display='block';
    if(chosen===q.ans){score++;note.innerHTML='✅ Bonne réponse !';}
    else{note.innerHTML=`❌ Mauvaise réponse. La bonne réponse était : <strong>${q.opts[q.ans]}</strong>`;}
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  box.innerHTML=`🎯 Votre score : ${score} / ${questions.length} ${score===questions.length?'— Parfait ! 🏆':score>=4?'— Très bien ! 👍':'— Continuez à pratiquer ! 💪'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
}

render();
</script>
</body>
</html>
