<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;font-size:1.4em;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.q-num{font-weight:bold;color:#2c5f8a;margin-bottom:8px;font-size:.95em}
.q-text{margin-bottom:10px;font-size:.95em;line-height:1.4}
.options label{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px;cursor:pointer;font-size:.9em;line-height:1.3}
.options input{margin-top:3px;flex-shrink:0}
.correct{color:#1a7a3c;font-weight:bold}
.wrong{color:#c0392b;font-weight:bold}
.answer-hint{font-size:.85em;margin-top:6px;color:#1a7a3c}
.btn{display:block;width:100%;max-width:340px;margin:10px auto;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
.btn-validate{background:#2c5f8a;color:#fff}
.btn-validate:hover{background:#1e4568}
.btn-reset{background:#e07b00;color:#fff}
.btn-reset:hover{background:#b55f00}
#score-box{text-align:center;font-size:1.2em;font-weight:bold;padding:14px;margin-bottom:10px;border-radius:8px;background:#e8f4ea;color:#1a7a3c;display:none}
</style>
</head>
<body>
<h1>📝 Quiz Business English du jour</h1>
<p class="subtitle">Meetings &amp; Communication — Testez vos 10 expressions !</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn btn-validate" id="btn-validate">Valider mes réponses</button>
<button class="btn btn-reset" id="btn-reset" style="display:none">🔄 Recommencer</button>

<script>
const questions = [
  {
    q: "Que signifie <strong>\"to ping someone\"</strong> ?",
    options: ["Appeler quelqu'un par téléphone","Envoyer un court message ou une notification","Organiser une réunion en personne","Mettre quelqu'un en copie d'un email"],
    answer: 1
  },
  {
    q: "Quelle expression signifie <strong>\"tenir quelqu'un informé\"</strong> ?",
    options: ["To loop someone in","To touch base with someone","To keep someone posted","To copy someone in"],
    answer: 2
  },
  {
    q: "Complétez la phrase : <em>\"Can you ________ Sarah? She's handling the budget approvals.\"</em>",
    options: ["ping","loop in","copy out","reach out"],
    answer: 1
  },
  {
    q: "Que signifie <strong>\"a heads up\"</strong> en français ?",
    options: ["Un résumé de réunion","Une réunion urgente","Une alerte / un avertissement donné à l'avance","Un ordre du jour"],
    answer: 2
  },
  {
    q: "Quelle expression utiliseriez-vous pour dire que vous n'avez pas reçu les informations importantes sur un sujet ?",
    options: ["I'm in the loop","I'm out of the loop","I've been copied in","I've touched base"],
    answer: 1
  },
  {
    q: "Que signifie <strong>\"no brainer\"</strong> ?",
    options: ["Une idée créative et originale","Une décision très risquée","Une erreur évidente","Une décision tellement évidente qu'elle ne demande aucune réflexion"],
    answer: 3
  }
];

const quiz = document.getElementById('quiz');
const btnValidate = document.getElementById('btn-validate');
const btnReset = document.getElementById('btn-reset');
const scoreBox = document.getElementById('score-box');

function render(){
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="q-num">Question ${i+1} / ${questions.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts-${i}">
      ${q.options.map((o,j)=>`<label><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('')}
    </div>
    <div class="answer-hint" id="hint-${i}" style="display:none"></div>`;
    quiz.appendChild(card);
  });
}

function validate(){
  let score=0;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const hint=document.getElementById(`hint-${i}`);
    const opts=document.querySelectorAll(`#opts-${i} label`);
    opts.forEach(l=>l.querySelector('input').disabled=true);
    if(sel){
      const val=parseInt(sel.value);
      const lbl=sel.parentElement;
      if(val===q.answer){
        score++;
        lbl.classList.add('correct');
        hint.style.display='none';
      } else {
        lbl.classList.add('wrong');
        hint.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.answer]}</strong>`;
        hint.style.display='block';
      }
    } else {
      hint.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.answer]}</strong>`;
      hint.style.display='block';
    }
    opts[q.answer].classList.add('correct');
  });
  const pct=Math.round(score/questions.length*100);
  scoreBox.style.display='block';
  scoreBox.style.background=score>=4?'#e8f4ea':'#fdecea';
  scoreBox.style.color=score>=4?'#1a7a3c':'#c0392b';
  scoreBox.innerHTML=`🎯 Votre score : <strong>${score} / ${questions.length}</strong> (${pct}%) ${score===questions.length?'— Parfait ! 🏆':score>=4?'— Bien joué ! 👍':'— Continuez à pratiquer ! 💪'}`;
  btnValidate.style.display='none';
  btnReset.style.display='block';
}

function reset(){
  scoreBox.style.display='none';
  btnValidate.style.display='block';
  btnReset.style.display='none';
  render();
  window.scrollTo(0,0);
}

btnValidate.addEventListener('click',validate);
btnReset.addEventListener('click',reset);
render();
</script>
</body>
</html>
