<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#f0f4f8;color:#222;padding:16px}
h1{text-align:center;color:#1a3a5c;font-size:1.4em;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
.option{display:block;padding:8px 12px;margin:4px 0;border-radius:6px;cursor:pointer;border:2px solid #d0d8e4;transition:border .2s,background .2s}
.option:hover{background:#e8f0fb;border-color:#4a90d9}
.option input{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important}
.wrong{background:#f8d7da!important;border-color:#dc3545!important}
.answer-note{font-size:.85em;margin-top:6px;padding:6px 10px;border-radius:5px;background:#fff8e1;border-left:3px solid #f0ad4e}
.btn{display:block;width:100%;max-width:340px;margin:16px auto 8px;padding:12px;font-size:1em;border:none;border-radius:8px;cursor:pointer;font-weight:bold;letter-spacing:.5px}
#btn-validate{background:#1a3a5c;color:#fff}
#btn-validate:hover{background:#255080}
#btn-reset{background:#6c757d;color:#fff;display:none}
#btn-reset:hover{background:#545b62}
#score-box{text-align:center;font-size:1.2em;font-weight:bold;margin:10px 0;padding:12px;background:#fff;border-radius:10px;display:none;box-shadow:0 2px 6px rgba(0,0,0,.1)}
em{font-style:italic;color:#1a3a5c}
</style>
</head>
<body>
<h1>🎓 Quiz Business English du jour</h1>
<p class="subtitle">Thème : Brainstorming, idées &amp; stratégie — 6 questions</p>
<div id="quiz"></div>
<div id="score-box"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
{q:'Que signifie <em>"blue-sky thinking"</em> ?',opts:['Une réflexion pessimiste sur l\'avenir','Une réflexion créative sans contraintes','Une analyse détaillée des risques','Un compte-rendu de réunion'],ans:1},
{q:'Quelle expression utilise-t-on pour <strong>développer une idée encore vague</strong> et lui donner plus de substance ?',opts:['To spitball','To bounce ideas off someone','To flesh something out','To think outside the box'],ans:2},
{q:'Complétez la phrase : <em>"I\'m just __________ here, but what if we repositioned the brand entirely?"</em>',opts:['blue-sky thinking','spitballing','game changing','signing off'],ans:1},
{q:'Que signifie <em>"game changer"</em> ?',opts:['Un jeu vidéo de management','Un changement mineur dans un projet','Une réunion de crise','Un élément qui transforme radicalement la situation'],ans:3},
{q:'Quelle expression signifie <strong>"obtenir l\'adhésion"</strong> des parties prenantes ? <em>(Révision)</em>',opts:['To sign off on something','To run something by someone','To get buy-in','To put ideas on the table'],ans:2},
{q:'Que signifie <em>"to sign off on something"</em> ? <em>(Révision)</em>',opts:['Démissionner d\'un projet','Approuver officiellement un document ou une décision','Envoyer un email de clôture','Lancer une idée sans filtre'],ans:1}
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Q${i+1} — ${q.q}</p>`;
    q.opts.forEach((o,j)=>{
      const lbl=document.createElement('label');
      lbl.className='option';
      lbl.innerHTML=`<input type="radio" name="q${i}" value="${j}"> ${o}`;
      div.appendChild(lbl);
    });
    quiz.appendChild(div);
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  document.getElementById('btn-validate').style.display='block';
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  const qDivs=document.querySelectorAll('.question');
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const opts=qDivs[i].querySelectorAll('.option');
    opts.forEach(l=>l.style.pointerEvents='none');
    const note=document.createElement('div');
    note.className='answer-note';
    if(sel){
      const val=parseInt(sel.value);
      opts[val].classList.add(val===q.ans?'correct':'wrong');
      if(val===q.ans){score++;note.textContent='✅ Bonne réponse !';}
      else{note.textContent=`❌ Mauvaise réponse. La bonne réponse était : "${q.opts[q.ans]}"`;}
    } else {
      note.textContent=`⚠️ Sans réponse. La bonne réponse était : "${q.opts[q.ans]}"`;
    }
    opts[q.ans].classList.add('correct');
    qDivs[i].appendChild(note);
  });
  const sb=document.getElementById('score-box');
  sb.style.display='block';
  const pct=Math.round(score/questions.length*100);
  sb.innerHTML=`Score : <span style="color:${score>=4?'#28a745':'#dc3545'}">${score}/${questions.length}</span> (${pct}%) ${score===questions.length?'🏆 Parfait !':score>=4?'👏 Bien joué !':'💪 Continuez !'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
});

document.getElementById('btn-reset').addEventListener('click',render);
render();
</script>
</body>
</html>
