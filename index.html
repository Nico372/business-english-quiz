<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:8px;font-size:1.4em}
.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
.option{display:block;padding:8px 12px;margin:5px 0;border-radius:6px;cursor:pointer;border:2px solid #ddd;background:#fafafa;transition:border-color .2s}
.option:hover{border-color:#2c5f8a}
.option input{margin-right:8px}
.correct{border-color:#27ae60!important;background:#eafaf1!important}
.wrong{border-color:#e74c3c!important;background:#fdf0ef!important}
.answer-label{font-size:.85em;margin-top:6px;color:#27ae60;font-weight:bold}
.wrong-answer-label{color:#e74c3c}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;margin-bottom:16px;font-size:1.2em;font-weight:bold}
.btn{display:block;width:100%;max-width:320px;margin:10px auto;padding:12px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-restart{background:#e07b00;color:#fff;display:none}
#btn-restart:hover{background:#b86000}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Prioritisation &amp; Workload — 6 questions sur les 10 expressions du jour</p>
<div id="score-box" style="display:none"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-restart">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"bandwidth"</em> dans un contexte professionnel ?',
    options:["La vitesse de connexion Internet","La capacité ou disponibilité d'une personne ou équipe","La taille d'un achat média","Un type de réunion d'équipe"],
    correct:1
  },
  {
    q:'Quelle expression signifie <em>prioritaire</em>, ce qui est traité en premier ?',
    options:["On the back burner","Quick win","On the front burner","Food for thought"],
    correct:2
  },
  {
    q:'Complétez la phrase : <em>"Before we kick off the project, let\'s get our ________ in a row."</em>',
    options:["plates","wins","ducks","ideas"],
    correct:2
  },
  {
    q:'Quelle expression de révision signifie <em>changer de stratégie</em> ?',
    options:["Consider it done","Food for thought","To pivot","To be swamped"],
    correct:2
  },
  {
    q:'Que veut dire <em>"to pick the low-hanging fruit"</em> ?',
    options:["S'attaquer aux tâches les plus complexes en premier","Éviter de travailler","S'occuper d'abord des tâches les plus simples et accessibles","Annuler des tâches secondaires"],
    correct:2
  },
  {
    q:'Quelle expression signifie <em>être débordé, submergé de travail</em> ?',
    options:["To have a lot on your plate","To be swamped","On the back burner","Quick win"],
    correct:1
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Question ${i+1}. ${q.q}</p>`;
    q.options.forEach((opt,j)=>{
      const label=document.createElement('label');
      label.className='option';
      label.innerHTML=`<input type="radio" name="q${i}" value="${j}"> ${opt}`;
      div.appendChild(label);
    });
    quiz.appendChild(div);
  });
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  const qDivs=document.querySelectorAll('.question');
  questions.forEach((q,i)=>{
    const selected=document.querySelector(`input[name="q${i}"]:checked`);
    const labels=qDivs[i].querySelectorAll('.option');
    labels.forEach(l=>l.style.pointerEvents='none');
    const correctLabel=labels[q.correct];
    correctLabel.classList.add('correct');
    if(selected){
      const val=parseInt(selected.value);
      if(val===q.correct){
        score++;
      } else {
        labels[val].classList.add('wrong');
        const info=document.createElement('div');
        info.className='answer-label wrong-answer-label';
        info.textContent='✗ Bonne réponse : '+q.options[q.correct];
        qDivs[i].appendChild(info);
      }
    } else {
      const info=document.createElement('div');
      info.className='answer-label wrong-answer-label';
      info.textContent='Sans réponse — Bonne réponse : '+q.options[q.correct];
      qDivs[i].appendChild(info);
    }
  });
  const box=document.getElementById('score-box');
  box.style.display='block';
  const emoji=score===6?'🏆':score>=4?'👍':score>=2?'💪':'📖';
  box.textContent=`${emoji} Votre score : ${score} / 6`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-restart').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('btn-restart').addEventListener('click',()=>{
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-restart').style.display='none';
  render();
});

render();
</script>
</body>
</html>
