<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{text-align:center;color:#1a3c5e;font-size:1.4rem;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9rem;margin-bottom:20px}
.question{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.q-label{font-weight:bold;margin-bottom:10px;font-size:.95rem}
.option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;border:2px solid #dde3ea;transition:border-color .2s}
.option:hover{border-color:#4a90d9}
.option input{cursor:pointer}
.option label{cursor:pointer;font-size:.9rem}
.correct{background:#e6f9ee;border-color:#27ae60!important}
.wrong{background:#fdecea;border-color:#e74c3c!important}
.answer-note{font-size:.82rem;margin-top:6px;color:#444}
.btn{display:block;width:100%;max-width:320px;margin:10px auto;padding:12px;border:none;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:bold}
#btn-validate{background:#1a3c5e;color:#fff}
#btn-validate:hover{background:#254f7a}
#btn-restart{background:#27ae60;color:#fff;display:none}
#btn-restart:hover{background:#1e8449}
#score-box{text-align:center;font-size:1.2rem;font-weight:bold;padding:14px;background:#fff;border-radius:10px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.08);display:none}
</style>
</head>
<body>
<h1>🎓 Quiz Business English du jour</h1>
<p class="subtitle">Priorités, charge de travail &amp; productivité — 6 questions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-restart">Recommencer</button>
<script>
const questions=[
{type:"mc",q:'Que signifie <em>"in the pipeline"</em> ?',options:["Un projet annulé","Un projet en cours de préparation","Un projet terminé","Un projet suspendu"],correct:1},
{type:"mc",q:'Quelle expression décrit une tâche mise de côté temporairement ?',options:["On the front burner","Quick win","Rush job","On the back burner"],correct:3},
{type:"mc",q:'Complétez : <em>"The launch is two weeks early — we\'re actually _____ _____ !"</em>',options:["behind schedule","in the pipeline","ahead of schedule","on the front burner"],correct:2},
{type:"mc",q:'Que signifie <em>"rush job"</em> ?',options:["Un travail effectué en avance","Un travail délégué à une autre équipe","Un travail fait dans l\'urgence","Un travail annulé en dernière minute"],correct:2},
{type:"mc",q:'Comment dit-on "accélérer le processus" pour gagner du temps sur un projet ?',options:["To back-burner","To fast-track","To deep dive","To quick win"],correct:1},
{type:"mc",q:'Révision — Que signifie <em>"blue-sky thinking"</em> ?',options:["Une réflexion stratégique très encadrée","Une réunion de bilan de projet","Une réflexion créative libre, sans contraintes","Une analyse des risques"],correct:2}
];

const quiz=document.getElementById("quiz");
const btnValidate=document.getElementById("btn-validate");
const btnRestart=document.getElementById("btn-restart");
const scoreBox=document.getElementById("score-box");

function render(){
  quiz.innerHTML="";
  questions.forEach((q,i)=>{
    const div=document.createElement("div");
    div.className="question";
    div.dataset.index=i;
    let html=`<div class="q-label">Q${i+1}. ${q.q}</div>`;
    q.options.forEach((opt,j)=>{
      html+=`<div class="option" id="opt-${i}-${j}"><input type="radio" name="q${i}" id="r${i}-${j}" value="${j}"><label for="r${i}-${j}">${opt}</label></div>`;
    });
    div.innerHTML=html;
    quiz.appendChild(div);
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const radios=document.querySelectorAll(`input[name="q${i}"]`);
    let chosen=null;
    radios.forEach(r=>{if(r.checked)chosen=parseInt(r.value);});
    if(chosen===null){allAnswered=false;return;}
    const opts=document.querySelectorAll(`[id^="opt-${i}-"]`);
    opts.forEach(o=>o.style.pointerEvents="none");
    if(chosen===q.correct){
      score++;
      document.getElementById(`opt-${i}-${chosen}`).classList.add("correct");
    } else {
      document.getElementById(`opt-${i}-${chosen}`).classList.add("wrong");
      document.getElementById(`opt-${i}-${q.correct}`).classList.add("correct");
      const note=document.createElement("div");
      note.className="answer-note";
      note.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.correct]}</strong>`;
      document.querySelector(`[data-index="${i}"]`).appendChild(note);
    }
  });
  if(!allAnswered){alert("Veuillez répondre à toutes les questions avant de valider.");return;}
  const pct=Math.round(score/questions.length*100);
  let msg=pct===100?"🏆 Parfait !":pct>=66?"👍 Bon travail !":"💪 Continuez à pratiquer !";
  scoreBox.innerHTML=`Score : <span style="color:${pct>=66?'#27ae60':'#e74c3c'}">${score}/${questions.length}</span> — ${msg}`;
  scoreBox.style.display="block";
  btnValidate.style.display="none";
  btnRestart.style.display="block";
  scoreBox.scrollIntoView({behavior:"smooth"});
}

function restart(){
  scoreBox.style.display="none";
  btnValidate.style.display="block";
  btnRestart.style.display="none";
  render();
  window.scrollTo({top:0,behavior:"smooth"});
}

btnValidate.addEventListener("click",validate);
btnRestart.addEventListener("click",restart);
render();
</script>
</body>
</html>
