<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{text-align:center;color:#1a3a5c;margin-bottom:6px;font-size:1.4em}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.88em;color:#1a3a5c;font-style:italic}
#score-box{background:#1a3a5c;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.2em;margin-bottom:16px;display:none}
.btn{display:block;width:100%;max-width:320px;margin:0 auto 12px;padding:12px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#1a3a5c;color:#fff}
#btn-validate:hover{background:#254d7a}
#btn-reset{background:#6c757d;color:#fff;display:none}
#btn-reset:hover{background:#545b62}
em{font-style:italic}
</style>
</head>
<body>
<h1>📝 Quiz Business English du jour</h1>
<p class="subtitle">Thème : urgence, délais et gestion du temps — 6 questions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions = [
  {
    q: "Que signifie <em>\"in the nick of time\"</em> ?",
    options: ["Trop tard pour agir", "Juste à temps, au tout dernier moment", "En avance sur le planning", "Sous pression constante"],
    answer: 1
  },
  {
    q: "Quelle abréviation utilise-t-on pour dire <em>\"fin de journée\"</em> dans un email professionnel ?",
    options: ["ASAP", "EOW", "EOD", "FYI"],
    answer: 2
  },
  {
    q: "Complétez la phrase :<br><em>\"The negotiation went __________ — we finally got the client to sign off late Friday evening.\"</em>",
    options: ["make-or-break", "down to the wire", "in crunch time", "at your earliest convenience"],
    answer: 1
  },
  {
    q: "Comment dit-on poliment <em>\"dès que vous pouvez\"</em> dans un email formel ?",
    options: ["ASAP", "In the nick of time", "At your earliest convenience", "EOW"],
    answer: 2
  },
  {
    q: "Que signifie <em>\"we're in crunch time\"</em> ?",
    options: ["On a du temps devant nous", "On est en réunion de bilan", "On est dans une période de pression intense", "On vient de terminer un projet"],
    answer: 2
  },
  {
    q: "<strong>Révision</strong> — Quelle expression signifie <em>\"approuver formellement sans vraiment examiner\"</em> ?",
    options: ["To call the shots", "Non-starter", "To rubber-stamp", "To get buy-in"],
    answer: 2
  }
];

const quizDiv = document.getElementById("quiz");
const scoreBox = document.getElementById("score-box");
const btnValidate = document.getElementById("btn-validate");
const btnReset = document.getElementById("btn-reset");

function render() {
  quizDiv.innerHTML = "";
  scoreBox.style.display = "none";
  scoreBox.innerHTML = "";
  btnValidate.style.display = "block";
  btnReset.style.display = "none";
  questions.forEach((q, i) => {
    const div = document.createElement("div");
    div.className = "question";
    div.innerHTML = `<p>Q${i+1}. ${q.q}</p>` +
      q.options.map((opt, j) => `<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`).join("") +
      `<div class="answer-info" id="info-${i}" style="display:none"></div>`;
    quizDiv.appendChild(div);
  });
}

btnValidate.addEventListener("click", () => {
  let score = 0;
  let allAnswered = true;
  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) { allAnswered = false; return; }
    const val = parseInt(selected.value);
    q.options.forEach((_, j) => {
      const lbl = document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents = "none";
      if (j === q.answer) lbl.classList.add("correct");
      else if (j === val && val !== q.answer) lbl.classList.add("wrong");
    });
    const info = document.getElementById(`info-${i}`);
    if (val === q.answer) {
      score++;
      info.textContent = "✅ Bonne réponse !";
    } else {
      info.textContent = `❌ Mauvaise réponse. La bonne réponse était : « ${q.options[q.answer]} »`;
    }
    info.style.display = "block";
  });
  if (!allAnswered) { alert("Veuillez répondre à toutes les questions."); return; }
  scoreBox.innerHTML = `🎯 Votre score : <strong>${score} / ${questions.length}</strong>${score===questions.length?" — Parfait ! 🏆":score>=4?" — Très bien ! 👍":" — Continuez à réviser ! 💪"}`;
  scoreBox.style.display = "block";
  btnValidate.style.display = "none";
  btnReset.style.display = "block";
  scoreBox.scrollIntoView({behavior:"smooth"});
});

btnReset.addEventListener("click", render);

render();
</script>
</body>
</html>
