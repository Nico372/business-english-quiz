<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;font-size:1.4em;text-align:center;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.card{background:#fff;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.question{font-weight:bold;margin-bottom:10px;font-size:.95em}
label{display:block;padding:8px 10px;margin:4px 0;border-radius:6px;cursor:pointer;border:1px solid #ddd;font-size:.9em;transition:background .2s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.show-answer{font-size:.85em;margin-top:6px;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;text-align:center;padding:16px;border-radius:10px;margin-bottom:16px;font-size:1.2em;font-weight:bold}
button{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold;margin-top:6px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-restart{background:#e07b00;color:#fff;margin-top:10px;display:none}
#btn-restart:hover{background:#b85f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Négociation, décisions &amp; approbations — 6 questions</p>
<div id="score-box" style="display:none"></div>
<div id="quiz"></div>
<button id="btn-validate">Valider mes réponses</button>
<button id="btn-restart">🔄 Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"to get buy-in"</em> ?',
    opts:["Acheter une part dans une entreprise","Obtenir l'adhésion et le soutien de personnes clés","Signer un contrat avec un nouveau client","Donner le feu vert à un projet"],
    ans:1
  },
  {
    q:'Complétez la phrase : <em>"Before the pitch, let\'s make sure we\'re all ________ on the key messages."</em>',
    opts:["on the back burner","off the charts","on the same page","up to speed"],
    ans:2
  },
  {
    q:'Quelle expression signifie <em>« soumettre une idée pour validation »</em> ?',
    opts:["To push back","To sign off on something","To meet halfway","To run something by someone"],
    ans:3
  },
  {
    q:'Que signifie <em>"to push back"</em> ?',
    opts:["Approuver avec enthousiasme une proposition","Résister ou contester une proposition","Repousser une réunion à plus tard","Donner un retour positif au client"],
    ans:1
  },
  {
    q:'Quelle expression signifie <em>« être débordé / surchargé »</em> ?',
    opts:["To be on the same page / to be aligned","To fast-track / to streamline","To be swamped / to be slammed","To sign off / to give the green light"],
    ans:2
  },
  {
    q:'Que signifie <em>"drinking from a firehose"</em> ?',
    opts:["Travailler sous forte pression physique","Être submergé d'informations difficiles à absorber","Gérer plusieurs clients en même temps","Donner trop d'informations au client"],
    ans:1
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`<div class="question">Q${i+1}. ${q.q}</div>`+
      q.opts.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.appendChild(card);
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-restart').style.display='none';
  document.getElementById('btn-validate').style.display='block';
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans){lbl.className='correct';}
      else if(j===chosen&&chosen!==q.ans){lbl.className='wrong';}
    });
    if(chosen===q.ans){score++;}
    else{
      const card=document.querySelectorAll('.card')[i];
      let hint=card.querySelector('.show-answer');
      if(!hint){hint=document.createElement('div');hint.className='show-answer';card.appendChild(hint);}
      hint.textContent='✅ Bonne réponse : '+q.opts[q.ans];
    }
  });
  if(!allAnswered){alert('Merci de répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  const emoji=score===questions.length?'🏆':score>=4?'👍':score>=2?'😊':'💪';
  box.textContent=`${emoji} Votre score : ${score} / ${questions.length} (${pct}%)`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-restart').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-restart').addEventListener('click',render);
render();
</script>
</body>
</html>
