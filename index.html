<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f4f8;color:#222;min-height:100vh;padding:16px}
h1{text-align:center;color:#1a3a5c;font-size:1.4rem;margin-bottom:4px}
.subtitle{text-align:center;color:#555;font-size:.9rem;margin-bottom:20px}
#quiz{max-width:680px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:18px 20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.qnum{font-size:.75rem;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.qtext{font-size:1rem;font-weight:600;color:#1a3a5c;margin-bottom:12px;line-height:1.4}
.options label{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:7px;cursor:pointer;border:2px solid #e2e8f0;transition:border-color .15s,background .15s;font-size:.95rem;line-height:1.35}
.options label:hover{border-color:#4a90d9;background:#eef5ff}
.options input[type=radio]{accent-color:#4a90d9;margin-top:3px;flex-shrink:0}
.correct{border-color:#22c55e!important;background:#f0fdf4!important}
.wrong{border-color:#ef4444!important;background:#fff1f1!important}
.answer-key{margin-top:8px;font-size:.85rem;color:#16a34a;font-weight:600}
.answer-wrong{color:#dc2626}
.score-box{background:#1a3a5c;color:#fff;border-radius:12px;padding:18px 20px;text-align:center;margin-bottom:20px;max-width:680px;margin-left:auto;margin-right:auto}
.score-box h2{font-size:1.6rem;margin-bottom:4px}
.score-box p{font-size:.95rem;opacity:.85}
.btn{display:block;width:100%;max-width:680px;margin:0 auto 12px;padding:14px;font-size:1rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:opacity .15s}
.btn-validate{background:#4a90d9;color:#fff}
.btn-validate:hover{opacity:.88}
.btn-reset{background:#e2e8f0;color:#1a3a5c}
.btn-reset:hover{opacity:.8}
.hidden{display:none}
em{font-style:italic;color:#1a3a5c}
</style>
</head>
<body>
<div id="quiz-wrap">
  <h1>🎓 Quiz Business English du jour</h1>
  <p class="subtitle">Thème : Dire au revoir &amp; conclure avec style — 6 questions</p>
  <div id="quiz"></div>
  <button class="btn btn-validate" id="btnValidate">✅ Valider mes réponses</button>
  <button class="btn btn-reset hidden" id="btnReset">🔄 Recommencer</button>
</div>

<script>
const questions = [
  {
    type: "sens",
    text: "Que signifie <em>\"Gotta bounce\"</em> ?",
    options: [
      "Je dois rebondir sur ce point et y répondre",
      "Je file / je dois y aller (informel, entre collègues proches)",
      "Je suis complètement débordé et indisponible",
      "Remettons ce sujet à plus tard"
    ],
    correct: 1
  },
  {
    type: "choix",
    text: "Quelle expression utiliserais-tu pour conclure un <strong>webinaire</strong> de manière élégante et tournée vers l'avenir ?",
    options: [
      "Gotta bounce",
      "I'm off",
      "Until next time",
      "Can we put a pin in that?"
    ],
    correct: 2
  },
  {
    type: "trou",
    text: "Complète la phrase : <em>\"Before we launch the campaign, let's make sure we're all ________ ________ ________ regarding the deliverables.\"</em>",
    options: [
      "calling it a day",
      "on the same page",
      "putting a pin in that",
      "circling back around"
    ],
    correct: 1
  },
  {
    type: "diff",
    text: "Quelle est la différence entre <em>\"See you soon\"</em> et <em>\"Speak soon\"</em> ?",
    options: [
      "Il n'y a aucune différence, les deux sont interchangeables",
      "<em>Speak soon</em> est plus formel et réservé aux emails officiels",
      "<em>See you soon</em> s'utilise en personne ; <em>Speak soon</em> est adapté aux échanges à distance (call, email)",
      "<em>See you soon</em> est britannique, <em>Speak soon</em> est américain"
    ],
    correct: 2
  },
  {
    type: "traduction",
    text: "Quelle expression anglaise correspond à <strong>« revenir sur un sujet plus tard »</strong> ?",
    options: [
      "Let's call it a day",
      "To circle back",
      "Take care",
      "Have a good one"
    ],
    correct: 1
  },
  {
    type: "contexte",
    text: "Ton collègue britannique termine son email par <em>\"Cheers!\"</em>. Qu'est-ce que cela signifie dans ce contexte ?",
    options: [
      "Il t'invite à trinquer lors d'un événement d'entreprise",
      "C'est une erreur, ce mot ne s'utilise pas en email professionnel",
      "C'est une façon décontractée de dire merci ou au revoir, très courante au Royaume-Uni",
      "Il exprime sa frustration de manière polie"
    ],
    correct: 2
  }
];

const correctAnswers = ["Je file / je dois y aller (informel, entre collègues proches)", "Until next time", "on the same page", "<em>See you soon</em> s'utilise en personne ; <em>Speak soon</em> est adapté aux échanges à distance (call, email)", "To circle back", "C'est une façon décontractée de dire merci ou au revoir, très courante au Royaume-Uni"];

function render() {
  const container = document.getElementById('quiz');
  container.innerHTML = '';
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="qnum">Question ${i + 1} / ${questions.length}</div>
      <div class="qtext">${q.text}</div>
      <div class="options" id="opts-${i}">
        ${q.options.map((opt, j) => `
          <label id="lbl-${i}-${j}">
            <input type="radio" name="q${i}" value="${j}"> ${opt}
          </label>`).join('')}
      </div>
      <div class="answer-key hidden" id="ak-${i}"></div>`;
    container.appendChild(card);
  });
}

document.getElementById('btnValidate').addEventListener('click', () => {
  let score = 0;
  let allAnswered = true;

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (!selected) { allAnswered = false; return; }

    const val = parseInt(selected.value);
    const labels = document.querySelectorAll(`#opts-${i} label`);
    const ak = document.getElementById(`ak-${i}`);

    labels.forEach((lbl, j) => {
      lbl.style.pointerEvents = 'none';
      if (j === q.correct) lbl.classList.add('correct');
      if (j === val && val !== q.correct) lbl.classList.add('wrong');
    });

    if (val === q.correct) {
      score++;
      ak.innerHTML = '✅ Bonne réponse !';
      ak.className = 'answer-key';
    } else {
      ak.innerHTML = `❌ Mauvaise réponse. La bonne réponse était : <strong>${q.options[q.correct]}</strong>`;
      ak.className = 'answer-key answer-wrong';
    }
    ak.classList.remove('hidden');
  });

  if (!allAnswered) {
    alert('⚠️ Merci de répondre à toutes les questions avant de valider !');
    return;
  }

  const wrap = document.getElementById('quiz-wrap');
  const existing = document.getElementById('score-box');
  if (existing) existing.remove();

  const emoji = score === 6 ? '🏆' : score >= 4 ? '👍' : '💪';
  const msg = score === 6 ? 'Parfait ! Excellente maîtrise !' : score >= 4 ? 'Très bien, continuez comme ça !' : 'Pas de panique, révisez et réessayez !';

  const box = document.createElement('div');
  box.className = 'score-box';
  box.id = 'score-box';
  box.innerHTML = `<h2>${emoji} ${score} / ${questions.length}</h2><p>${msg}</p>`;
  wrap.insertBefore(box, document.getElementById('quiz'));

  document.getElementById('btnValidate').classList.add('hidden');
  document.getElementById('btnReset').classList.remove('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
});

document.getElementById('btnReset').addEventListener('click', () => {
  const existing = document.getElementById('score-box');
  if (existing) existing.remove();
  render();
  document.getElementById('btnValidate').classList.remove('hidden');
  document.getElementById('btnReset').classList.add('hidden');
  window.scrollTo({top: 0, behavior: 'smooth'});
});

render();
</script>
</body>
</html>
