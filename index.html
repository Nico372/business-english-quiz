<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:6px;font-size:1.4em}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.9em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;transition:background .2s}
label:hover{background:#eef3fb}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important}
.wrong{background:#f8d7da!important;border-color:#dc3545!important}
.feedback{margin-top:8px;font-size:.88em;padding:6px 10px;border-radius:4px}
.feedback.ok{color:#155724;background:#d4edda}
.feedback.ko{color:#721c24;background:#f8d7da}
#score-box{text-align:center;background:#2c5f8a;color:#fff;padding:14px;border-radius:8px;margin-bottom:16px;font-size:1.2em;font-weight:bold}
.btn{display:block;width:100%;max-width:320px;margin:0 auto 12px;padding:12px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b85e00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Expressions sur le temps, les délais &amp; révisions — 6 questions</p>
<div id="score-box" style="display:none"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-reset">Recommencer</button>
<script>
const questions=[
  {
    q:"Que signifie <em>\"to fast-track\"</em> ?",
    opts:["Ralentir un processus pour garantir la qualité","Accélérer un processus au-delà du calendrier normal","Annuler complètement un projet","Déléguer une tâche à un autre département"],
    ans:1
  },
  {
    q:"Quelle expression signifie <em>\"en cours, dans les tuyaux\"</em> ?",
    opts:["All systems go","Make-or-break time","In the pipeline","Behind schedule"],
    ans:2
  },
  {
    q:"Complétez la phrase : <em>\"The assets are approved and the media is booked — ________ systems go for Monday's launch.\"</em>",
    opts:["every","full","all","both"],
    ans:2
  },
  {
    q:"Que signifie <em>\"make-or-break time\"</em> ?",
    opts:["Un moment pour célébrer le succès","Un bon moment pour faire une pause","Un moment décisif qui déterminera le succès ou l'échec","Une période de planification à long terme"],
    ans:2
  },
  {
    q:"Quelle expression signifie <em>\"partie prenante\"</em> ?",
    opts:["Decision-maker","Bandwidth","Rush job","Stakeholder"],
    ans:3
  },
  {
    q:"Complétez la phrase : <em>\"Given the client's urgent request, we'll need to ________ the social assets and ________ the internal newsletter.\"</em>",
    opts:["deprioritize / prioritize","fast-track / pipeline","prioritize / deprioritize","onboard / pitch"],
    ans:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Question ${i+1}. ${q.q}</p>`+
      q.opts.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.appendChild(div);
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  document.querySelectorAll('.feedback').forEach(f=>f.remove());
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    const correct=q.ans;
    // reset labels
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.classList.remove('correct','wrong');
    });
    const chosenLbl=document.getElementById(`lbl-${i}-${chosen}`);
    const correctLbl=document.getElementById(`lbl-${i}-${correct}`);
    let fb=document.createElement('div');
    fb.className='feedback';
    if(chosen===correct){
      score++;
      chosenLbl.classList.add('correct');
      fb.className='feedback ok';
      fb.textContent='✅ Bonne réponse !';
    } else {
      chosenLbl.classList.add('wrong');
      correctLbl.classList.add('correct');
      fb.className='feedback ko';
      fb.textContent=`❌ Mauvaise réponse. La bonne réponse était : "${q.opts[correct]}"`;
    }
    const qDiv=chosenLbl.closest('.question');
    const old=qDiv.querySelector('.feedback');
    if(old)old.remove();
    qDiv.appendChild(fb);
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  box.textContent=`🎯 Score : ${score} / ${questions.length}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-reset').addEventListener('click',render);
render();
</script>
</body>
</html>
