<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;font-size:1.4em;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
.option{display:block;padding:8px 12px;margin:5px 0;border-radius:6px;border:2px solid #ddd;cursor:pointer;transition:border-color .2s;font-size:.95em}
.option:hover{border-color:#2c5f8a}
.option input{margin-right:8px}
.correct{background:#d4edda;border-color:#28a745;color:#155724}
.wrong{background:#f8d7da;border-color:#dc3545;color:#721c24}
.answer-note{font-size:.85em;margin-top:6px;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.2em;font-weight:bold;margin-bottom:16px;display:none}
.btn{display:block;width:100%;max-width:320px;margin:10px auto;padding:12px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-restart{background:#e07b00;color:#fff;display:none}
#btn-restart:hover{background:#b86200}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Thème : <em>Closing Conversations &amp; Goodbyes</em></p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate" onclick="validate()">Valider mes réponses</button>
<button class="btn" id="btn-restart" onclick="restart()">Recommencer</button>
<script>
const questions=[
{q:'Que signifie <strong>"Let\'s call it a day"</strong> ?',options:["Commençons une nouvelle journée de travail","Arrêtons de travailler pour aujourd\'hui","Ajoutons un point à l\'ordre du jour","Planifions une réunion demain"],correct:1},
{q:'Quelle expression signifie <strong>"je file"</strong> (partir rapidement, très informel) ?',options:["Take care","Speak soon","Gotta bounce","Have a good one"],correct:2},
{q:'Complétez : <em>"You mentioned a new idea for the pitch? ________ — go ahead!"</em>',options:["Gotta bounce","I\'m all ears","Until next time","Cheers"],correct:1},
{q:'Quelle expression anglaise correspond à <strong>"à la prochaine"</strong>, utilisée en fin de réunion récurrente ?',options:["Speak soon","Take care","I\'m off","Until next time"],correct:3},
{q:'Que signifie <strong>"from the get-go"</strong> ?',options:["Après un démarrage lent","À un moment donné du projet","Dès le tout début","Vers la fin du projet"],correct:2},
{q:'<strong>"Cheers"</strong> en anglais britannique peut s\'utiliser pour… (plusieurs usages possibles — choisissez la réponse complète)',options:["Remercier seulement","Dire au revoir seulement","Remercier ET dire au revoir","Uniquement dans les emails formels"],correct:2},
{q:'Complétez : <em>"We need someone to ________ on this rebranding project before the client loses patience."</em>',options:["call it a day","get the ball rolling","bounce","speak soon"],correct:1},
{q:'Quelle est la différence entre <strong>"Speak soon"</strong> et <strong>"Until next time"</strong> ?',options:["Il n\'y a aucune différence","«\u00a0Speak soon\u00a0» suggère un prochain contact proche\u00a0; «\u00a0Until next time\u00a0» est un au revoir plus général","«\u00a0Until next time\u00a0» ne s\'utilise qu\'à l\'écrit","«\u00a0Speak soon\u00a0» est plus formel"],correct:1},
{q:'<strong>"I\'m off"</strong> est-il approprié dans un email formel à un client senior ?',options:["Oui, c\'est une formule standard","Oui, si on le traduit","Non, c\'est trop informel — il faut une formule plus soutenue","Oui, en anglais britannique uniquement"],correct:2},
{q:'Quelle expression utiliseriez-vous pour <strong>lancer un projet</strong> et faire avancer les choses ?',options:["Have a good one","Take care","To get the ball rolling","I\'m all ears"],correct:2}
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    let opts=q.options.map((o,j)=>`<label class="option"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.innerHTML+=`<div class="question" id="q${i}"><p>${i+1}. ${q.q}</p>${opts}</div>`;
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const val=parseInt(sel.value);
    const block=document.getElementById(`q${i}`);
    const labels=block.querySelectorAll('.option');
    labels.forEach((lbl,j)=>{
      lbl.style.pointerEvents='none';
      if(j===q.correct) lbl.classList.add('correct');
      else if(j===val && val!==q.correct) lbl.classList.add('wrong');
    });
    if(val===q.correct) score++;
    if(val!==q.correct){
      const note=document.createElement('div');
      note.className='answer-note';
      note.innerHTML=`✅ Bonne réponse : <strong>${q.options[q.correct]}</strong>`;
      block.appendChild(note);
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const emoji=score===6?'🏆':score>=4?'👍':'💪';
  box.innerHTML=`${emoji} Votre score : <span style="font-size:1.4em">${score}/6... attendez — ${score}/${questions.length}</span><br><small>${score===questions.length?'Parfait !':score>=7?'Excellent !':score>=5?'Très bien !':'Continuez à pratiquer !'}</small>`;
  box.innerHTML=`${emoji} Votre score : <span style="font-size:1.3em">${score} / ${questions.length}</span><br><small>${score===questions.length?'Parfait ! 🎯':score>=8?'Excellent ! 🌟':score>=6?'Très bien ! 👏':'Continuez à pratiquer ! 💪'}</small>`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-restart').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
}

function restart(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-restart').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
