<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:6px;font-size:1.4em}
.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;font-size:.95em}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;font-size:.9em;transition:background .2s}
label:hover{background:#eef3ff}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;color:#155724;border:1px solid #b8dfc4}
.wrong{background:#f8d7da!important;color:#721c24;border:1px solid #f0b4bb}
.answer-info{margin-top:8px;font-size:.85em;color:#2c5f8a;font-style:italic}
#score-box{background:#2c5f8a;color:#fff;border-radius:8px;padding:16px;text-align:center;font-size:1.2em;font-weight:bold;margin-bottom:16px;display:none}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;margin-bottom:10px}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b55f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Idioms &amp; Expressions for Difficult Situations</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate" onclick="validate()">Valider mes réponses</button>
<button class="btn" id="btn-reset" onclick="reset()">🔄 Recommencer</button>
<script>
const questions=[
  {q:'Que signifie <em>"a red flag"</em> ?',opts:['Un jalon positif à célébrer','Un signal d\'alarme indiquant un problème potentiel','Une deadline manquée','Une opportunité commerciale'],ans:1},
  {q:'Quelle expression désigne <em>un goulot d\'étranglement</em> dans un processus ?',opts:['A can of worms','Damage control','A bottleneck','A red flag'],ans:2},
  {q:'Complétez : "Nobody wants to say it, but the ________ is that our biggest client is unhappy."',opts:['bottleneck','pain point','elephant in the room','heads up'],ans:2},
  {q:'Que signifie <em>"to backfire"</em> ?',opts:['Réussir au-delà des attentes','Annuler un projet en cours','Produire l\'effet contraire à celui escompté','Lancer une campagne en urgence'],ans:2},
  {q:'Quelle expression décrit les <em>actions prises pour limiter les dégâts après une erreur</em> ?',opts:['A pain point','Damage control','To hit a wall','To loop someone in'],ans:1},
  {q:'Quelle expression convient quand <em>soulever un problème en crée dix autres</em> ?',opts:['A pain point','A roadblock','A can of worms','Damage control'],ans:2},
  {q:'Complétez : "We\'ve completely ________ with the tech team — they say the platform can\'t support the feature."',opts:['looped in','hit a wall','opened a red flag','done damage control'],ans:1},
  {q:'Que signifie <em>"a pain point"</em> dans le contexte client ?',opts:['Une deadline serrée','Un désaccord interne à l\'équipe','Un problème ou une frustration récurrente du client','Un signal d\'alarme'],ans:2},
  {q:'Quelle expression de révision signifie <em>"ne pas être au courant"</em> ?',opts:['To loop someone in','Heads up','To be out of the loop','Bottleneck'],ans:2},
  {q:'Complétez : "Just a ________ — the CFO will be joining the budget review call."',opts:['pain point','can of worms','red flag','heads up'],ans:3}
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    let opts=q.opts.map((o,j)=>`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('');
    quiz.innerHTML+=`<div class="question" id="q${i}"><p>Q${i+1}. ${q.q}</p>${opts}<div class="answer-info" id="info${i}" style="display:none"></div></div>`;
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    for(let j=0;j<q.opts.length;j++){
      const lbl=document.getElementById(`lbl-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans) lbl.className='correct';
      else if(j===chosen && chosen!==q.ans) lbl.className='wrong';
    }
    const info=document.getElementById(`info${i}`);
    info.style.display='block';
    if(chosen===q.ans){score++;info.innerHTML='✅ Bonne réponse !';}
    else{info.innerHTML=`❌ Mauvaise réponse. La bonne réponse était : <strong>${q.opts[q.ans]}</strong>`;}
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  box.innerHTML=`🎯 Votre score : ${score} / ${questions.length} ${score===questions.length?'— Excellent ! 🏆':score>=4?'— Bien joué ! 👍':'— Continuez vos efforts ! 💪'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
