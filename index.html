<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;font-size:1.4em;text-align:center;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;font-size:.95em}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;border:1px solid #ddd;font-size:.9em;transition:background .2s}
label:hover{background:#eef4ff}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.85em;color:#2c5f8a;font-weight:bold}
.btn{display:block;width:100%;max-width:320px;margin:10px auto;padding:12px;border:none;border-radius:6px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-restart{background:#e07b00;color:#fff;display:none}
#score-box{text-align:center;font-size:1.2em;font-weight:bold;margin:14px 0;color:#2c5f8a;display:none}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Numbers, Approximations &amp; Everyday Filler Phrases</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button class="btn" id="btn-validate">Valider mes réponses</button>
<button class="btn" id="btn-restart">Recommencer</button>
<script>
const questions=[
  {q:'Que signifie <em>"a ballpark figure"</em> ?',opts:['Un chiffre exact et confirmé','Une estimation approximative','Un chiffre partagé en interne uniquement','Un budget très élevé'],ans:1},
  {q:'Complète la phrase : "The event should start at seven-________ — the venue is still setting up."',opts:['wise','like','ish','out'],ans:2},
  {q:'Quelle expression signifie <em>"en fin de compte"</em> ?',opts:['Break a leg','Brace yourself','Cash cow','At the end of the day'],ans:3},
  {q:'<em>"Break a leg"</em> est-il un avertissement littéral de faire attention à ne pas se blesser ?',opts:['Oui, c\'est un conseil de sécurité','Non, cela signifie "bonne chance"','Oui, utilisé avant les activités sportives','Non, cela signifie "prépare-toi"'],ans:1},
  {q:'Que signifie <em>"cash cow"</em> dans un contexte professionnel ?',opts:['Un client très exigeant','Une campagne à très gros budget','Un produit ou client qui génère des revenus stables et fiables','Une dépense imprévue'],ans:2},
  {q:'Complète : "________ the whole strategy team for getting the global deck done overnight!"',opts:['Brace yourself to','Break a leg for','All hands on','Shout out to'],ans:3},
  {q:'Que signifie <em>"it\'s not rocket science"</em> ?',opts:['La tâche nécessite une expertise technique spécialisée','Le projet avance très vite','La tâche est simple et pas compliquée','C\'est une nouvelle technologie'],ans:2},
  {q:'Quelle expression signifie <em>"tout le monde sur le pont"</em> ?',opts:['To go the extra mile','To gain traction','Shout out to','All hands on deck'],ans:3},
  {q:'<em>"To gain traction"</em> signifie qu\'un projet ralentit et perd de l\'élan.',opts:['Vrai','Faux — cela signifie que quelque chose prend de la vitesse','Vrai, c\'est un signe d\'alerte','Faux — cela signifie que le projet est terminé'],ans:1},
  {q:'Que signifie <em>"brace yourself"</em> ?',opts:['Se préparer à quelque chose de surprenant ou difficile','Conclure une réunion','Donner un feedback positif','Faire un effort supplémentaire'],ans:0}
];

function render(){
  const div=document.getElementById('quiz');
  div.innerHTML='';
  questions.forEach((q,i)=>{
    let html=`<div class="question" id="q${i}"><p>${i+1}. ${q.q}</p>`;
    q.opts.forEach((o,j)=>{
      html+=`<label id="l${i}_${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`;
    });
    html+='<div class="answer-info" id="ai'+i+'" style="display:none"></div></div>';
    div.innerHTML+=html;
  });
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-restart').style.display='none';
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const ai=document.getElementById('ai'+i);
    for(let j=0;j<q.opts.length;j++){
      const lbl=document.getElementById(`l${i}_${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans) lbl.classList.add('correct');
    }
    if(sel){
      const v=parseInt(sel.value);
      if(v===q.ans){score++;} 
      else{document.getElementById(`l${i}_${v}`).classList.add('wrong');}
    }
    ai.style.display='block';
    ai.textContent='✅ Bonne réponse : '+q.opts[q.ans];
  });
  const sb=document.getElementById('score-box');
  sb.textContent=`🎯 Score : ${score} / ${questions.length}`;
  sb.style.display='block';
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-restart').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});

document.getElementById('btn-restart').addEventListener('click',render);
render();
</script>
</body>
</html>
