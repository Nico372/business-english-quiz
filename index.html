<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f5;color:#2c2c2c;padding:16px}
h1{background:#d0021b;color:#fff;padding:20px 24px;border-radius:8px 8px 0 0;font-size:20px;margin-bottom:0}
.subtitle{background:#b80018;color:#f9d0d4;padding:8px 24px 12px;font-size:13px;border-radius:0;margin-bottom:16px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:20px;margin-bottom:14px}
.card h3{font-size:15px;margin-bottom:12px;line-height:1.5}
.options label{display:block;padding:8px 12px;margin:5px 0;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:14px;transition:background .2s}
.options label:hover{background:#fff0f0}
.options input{margin-right:8px}
.correct{background:#e6f9ed!important;border-color:#27ae60!important;color:#1a7a40}
.wrong{background:#fdecea!important;border-color:#e74c3c!important;color:#c0392b}
.answer-note{font-size:13px;margin-top:8px;padding:8px;border-radius:5px;background:#fff8e1;border-left:3px solid #f39c12}
#score-box{display:none;background:#fff;border:2px solid #d0021b;border-radius:8px;padding:20px;margin-bottom:16px;text-align:center}
#score-box h2{color:#d0021b;font-size:22px}
#score-box p{margin-top:6px;font-size:15px}
.btn{display:inline-block;padding:12px 28px;border:none;border-radius:6px;font-size:15px;cursor:pointer;font-weight:bold;margin:4px}
#btn-validate{background:#d0021b;color:#fff}
#btn-validate:hover{background:#b80018}
#btn-reset{background:#555;color:#fff;display:none}
#btn-reset:hover{background:#333}
.btn-row{text-align:center;margin-top:8px}
@media(max-width:480px){h1{font-size:17px}.card{padding:14px}}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<div class="subtitle">📚 Thème : <strong>Communicating &amp; Staying in Touch</strong></div>
<div id="score-box"></div>
<div id="quiz"></div>
<div class="btn-row">
  <button class="btn" id="btn-validate" onclick="validate()">Valider mes réponses</button>
  <button class="btn" id="btn-reset" onclick="reset()">Recommencer</button>
</div>
<script>
const questions=[
  {
    q:'Que signifie <strong>"to ping someone"</strong> ?',
    options:['Planifier une réunion formelle','Envoyer un court message de notification','Approuver un document officiel','Mettre fin à une conversation'],
    answer:1
  },
  {
    q:'Quelle expression signifie <em>"prendre contact avec quelqu\'un"</em> ?',
    options:['To sync up','To loop someone in','To reach out to someone','To touch base'],
    answer:2
  },
  {
    q:'Complétez : <em>"Let\'s ______ tomorrow morning to make sure everyone is on track."</em> (se synchroniser)',
    options:['drop a line','give a shout','touch base','sync up'],
    answer:3
  },
  {
    q:'Que signifie <strong>"to keep someone posted"</strong> ?',
    options:['Envoyer un colis à quelqu\'un','Exclure quelqu\'un d\'un projet','Tenir quelqu\'un informé','Contacter rapidement quelqu\'un'],
    answer:2
  },
  {
    q:'Quelle expression utiliseriez-vous pour dire <em>"Inclus Marie dans l\'échange, elle doit être au courant"</em> ?',
    options:['Touch base with Marie','Loop Marie in','Ping Marie out','Drop Marie a line'],
    answer:1
  },
  {
    q:'Que signifie <strong>"to give someone a shout"</strong> ?',
    options:['Faire un compliment formel','Envoyer un rapport détaillé','Contacter quelqu\'un rapidement','Organiser une conférence'],
    answer:2
  }
];

function render(){
  const container=document.getElementById('quiz');
  container.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.id='card-'+i;
    let html=`<h3>Question ${i+1} / ${questions.length} — ${q.q}</h3><div class="options">`;
    q.options.forEach((opt,j)=>{
      html+=`<label id="lbl-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${opt}</label>`;
    });
    html+=`</div><div class="answer-note" id="note-${i}" style="display:none"></div>`;
    card.innerHTML=html;
    container.appendChild(card);
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    const labels=document.querySelectorAll(`#card-${i} .options label`);
    labels.forEach(l=>l.style.pointerEvents='none');
    if(chosen===q.answer){
      score++;
      document.getElementById(`lbl-${i}-${chosen}`).classList.add('correct');
      document.getElementById(`note-${i}`).style.display='block';
      document.getElementById(`note-${i}`).innerHTML='✅ Bonne réponse !';
    } else {
      document.getElementById(`lbl-${i}-${chosen}`).classList.add('wrong');
      document.getElementById(`lbl-${i}-${q.answer}`).classList.add('correct');
      document.getElementById(`note-${i}`).style.display='block';
      document.getElementById(`note-${i}`).innerHTML=`❌ Mauvaise réponse. La bonne réponse était : <strong>${q.options[q.answer]}</strong>`;
    }
  });
  if(!allAnswered){alert('Merci de répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  let msg=pct===100?'🏆 Parfait !':pct>=66?'👍 Bien joué !':pct>=33?'💪 Continuez !':'📖 Révisez les expressions !';
  box.innerHTML=`<h2>Votre score : ${score} / ${questions.length}</h2><p>${msg} (${pct}%)</p>`;
  box.scrollIntoView({behavior:'smooth'});
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='inline-block';
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='inline-block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
