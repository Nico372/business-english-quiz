<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;font-size:1.4em;margin-bottom:6px}
.subtitle{text-align:center;color:#555;font-size:.9em;margin-bottom:20px}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;font-size:.95em}
.option{display:flex;align-items:center;gap:8px;padding:8px;border-radius:6px;cursor:pointer;margin-bottom:6px;border:1px solid #ddd;transition:background .2s}
.option:hover{background:#e8f0fe}
.option input{cursor:pointer}
.option label{cursor:pointer;font-size:.9em}
.correct{background:#d4edda!important;border-color:#28a745!important}
.wrong{background:#f8d7da!important;border-color:#dc3545!important}
.feedback{font-size:.85em;margin-top:8px;padding:6px 10px;border-radius:4px}
.feedback.ok{color:#155724;background:#d4edda}
.feedback.ko{color:#721c24;background:#f8d7da}
#score-box{text-align:center;font-size:1.3em;font-weight:bold;color:#2c5f8a;margin:16px 0;padding:14px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
button{padding:12px 24px;border:none;border-radius:6px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4466}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b56200}
.tag{font-size:.75em;color:#888;font-weight:normal;margin-left:6px}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Pitching, Client Relations &amp; Business Development</p>
<div id="quiz"></div>
<div id="score-box" style="display:none"></div>
<div class="btns">
  <button id="btn-validate">Valider mes réponses</button>
  <button id="btn-reset">Recommencer</button>
</div>
<script>
const questions=[
  {
    q:'Que signifie <em>"to onboard a client"</em> ?',
    tag:'Nouvelle expression',
    options:["Inviter un client à un événement d'entreprise","Intégrer formellement un nouveau client dans les processus de l'agence","Présenter une nouvelle idée à un client","Envoyer une facture à un client"],
    answer:1
  },
  {
    q:'Quelle expression anglaise correspond à <em>« partie prenante »</em> ?',
    tag:'Nouvelle expression',
    options:["Decision-maker","Deal-breaker","Stakeholder","Fast-tracker"],
    answer:2
  },
  {
    q:'Complétez : <em>"We only had 30 seconds with the CEO in the lift, so I gave him my ________ and he seemed genuinely interested."</em>',
    tag:'Nouvelle expression',
    options:["mood board","wrap-up","elevator pitch","rush job"],
    answer:2
  },
  {
    q:'Que signifie <em>"to upsell"</em> ?',
    tag:'Nouvelle expression',
    options:["Vendre un service complémentaire","Vendre une version supérieure de ce que le client a déjà","Perdre un appel d'offres","Accélérer une vente"],
    answer:1
  },
  {
    q:'Que signifie <em>"in the pipeline"</em> ?',
    tag:'Révision',
    options:["Déjà livré et terminé","En cours ou en cours de planification","Annulé faute de budget","En attente de validation finale"],
    answer:1
  },
  {
    q:'Complétez : <em>"There are too many ________ involved — we need to identify who has the final say."</em>',
    tag:'Nouvelle expression',
    options:["rush jobs","elevator pitches","decision-makers","stakeholders"],
    answer:3
  },
  {
    q:'Que signifie <em>"to fast-track"</em> ?',
    tag:'Révision',
    options:["Ralentir un projet pour contrôle qualité","Annuler un projet","Accélérer un processus ou une décision","Sous-traiter une tâche urgente"],
    answer:2
  },
  {
    q:'Quelle expression utiliseriez-vous pour <em>ouvrir poliment une réunion</em> en reconnaissant l\'emploi du temps chargé du client ?',
    tag:'Nouvelle expression',
    options:['"Let\'s cut to the chase."','"Thank you for making the time to join us today."','"We\'re good to go."','"Let\'s get the ball rolling."'],
    answer:1
  },
  {
    q:'Complétez : <em>"The competing agency ________ the ________, but our creative work was stronger."</em>',
    tag:'Nouvelle expression',
    options:["lost / pitch","pitched / idea","fast-tracked / deal","won / pitch"],
    answer:3
  },
  {
    q:'Qu\'est-ce qu\'un <em>"rush job"</em> ?',
    tag:'Révision',
    options:["Un projet annulé en urgence","Un travail bâclé","Un travail urgent à réaliser rapidement","Une réunion improvisée"],
    answer:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    const div=document.createElement('div');
    div.className='question';
    div.innerHTML=`<p>Q${i+1}. ${q.q} <span class="tag">${q.tag}</span></p>`;
    q.options.forEach((opt,j)=>{
      const id=`q${i}_o${j}`;
      const row=document.createElement('div');
      row.className='option';
      row.innerHTML=`<input type="radio" name="q${i}" id="${id}" value="${j}"><label for="${id}">${opt}</label>`;
      div.appendChild(row);
    });
    div.innerHTML+=`<div class="feedback" id="fb${i}" style="display:none"></div>`;
    quiz.appendChild(div);
  });
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    const fb=document.getElementById(`fb${i}`);
    const opts=document.querySelectorAll(`input[name="q${i}"]`);
    if(!sel){allAnswered=false;return;}
    const val=parseInt(sel.value);
    opts.forEach(o=>{
      const row=o.parentElement;
      row.style.pointerEvents='none';
      if(parseInt(o.value)===q.answer) row.classList.add('correct');
      else if(parseInt(o.value)===val && val!==q.answer) row.classList.add('wrong');
    });
    if(val===q.answer){
      score++;
      fb.className='feedback ok';
      fb.textContent='✅ Bonne réponse !';
    } else {
      fb.className='feedback ko';
      fb.textContent=`❌ Mauvaise réponse. La bonne réponse était : "${q.options[q.answer]}"`;
    }
    fb.style.display='block';
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const sb=document.getElementById('score-box');
  sb.style.display='block';
  const pct=Math.round(score/questions.length*100);
  let emoji=pct>=80?'🏆':pct>=50?'👍':'💪';
  sb.innerHTML=`${emoji} Votre score : <span style="color:${pct>=80?'#28a745':pct>=50?'#e07b00':'#dc3545'}">${score}/${questions.length}</span> (${pct}%)`;
  sb.scrollIntoView({behavior:'smooth'});
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='inline-block';
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  render();
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='inline-block';
  document.getElementById('btn-reset').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
});

render();
</script>
</body>
</html>
