<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;text-align:center;margin-bottom:8px;font-size:1.4em}
p.sub{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.question{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.question p{font-weight:bold;margin-bottom:10px;line-height:1.4}
label{display:block;padding:7px 10px;border-radius:5px;cursor:pointer;margin-bottom:5px;border:1px solid #ddd;transition:background .15s}
label:hover{background:#e8f0fe}
input[type=radio]{margin-right:8px}
.correct{background:#d4edda!important;border-color:#28a745!important;color:#155724}
.wrong{background:#f8d7da!important;border-color:#dc3545!important;color:#721c24}
.answer-info{margin-top:8px;font-size:.88em;color:#2c5f8a;font-style:italic}
#score-box{display:none;background:#2c5f8a;color:#fff;text-align:center;padding:16px;border-radius:8px;margin-bottom:16px;font-size:1.2em}
button{display:block;width:100%;max-width:340px;margin:0 auto 12px;padding:13px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b85f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="sub">Everyday Office Idioms &amp; Workplace Expressions — 6 questions</p>
<div id="score-box"></div>
<div id="quiz"></div>
<button id="btn-validate" onclick="validate()">Valider mes réponses</button>
<button id="btn-reset" onclick="reset()">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"to wear many hats"</em> ?',
    options:["S'habiller élégamment pour les clients","Avoir plusieurs rôles ou responsabilités","Diriger une grande équipe","Être en avance sur le planning"],
    answer:1
  },
  {
    q:'Complétez : "Sorry I can\'t take on anything else — I\'m completely ________."',
    options:["on the same page","ahead of schedule","slammed","drinking from a firehose"],
    answer:2
  },
  {
    q:'Quelle expression signifie <em>ne rien laisser au hasard</em> ?',
    options:["To bite the bullet","To jump in with both feet","To have skin in the game","To cross every T and dot every I"],
    answer:3
  },
  {
    q:'Que signifie <em>"to have skin in the game"</em> ?',
    options:["Négocier un meilleur accord","Prendre en charge le travail créatif","Être personnellement impliqué et avoir quelque chose en jeu","Superviser l'équipe créative"],
    answer:2
  },
  {
    q:'Quelle expression signifie <em>trouver un compromis</em> ?',
    options:["To be on the same page","To get buy-in","To do the heavy lifting","To meet halfway"],
    answer:3
  },
  {
    q:'Que signifie <em>"to jump in with both feet"</em> ?',
    options:["Rejoindre une réunion en retard","Interrompre quelqu'un","Se lancer à fond dans quelque chose","Déléguer une tâche difficile"],
    answer:2
  }
];

function render(){
  const quiz=document.getElementById('quiz');
  quiz.innerHTML='';
  questions.forEach((q,i)=>{
    let opts=q.options.map((o,j)=>`
      <label id="lbl-${i}-${j}">
        <input type="radio" name="q${i}" value="${j}"> ${o}
      </label>`).join('');
    quiz.innerHTML+=`<div class="question" id="q-block-${i}">
      <p>Q${i+1}. ${q.q}</p>
      ${opts}
      <div class="answer-info" id="info-${i}" style="display:none"></div>
    </div>`;
  });
}

function validate(){
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    const correct=q.answer;
    const lblCorrect=document.getElementById(`lbl-${i}-${correct}`);
    if(chosen===correct){
      score++;
      lblCorrect.classList.add('correct');
    } else {
      document.getElementById(`lbl-${i}-${chosen}`).classList.add('wrong');
      lblCorrect.classList.add('correct');
    }
    document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>r.disabled=true);
    const info=document.getElementById(`info-${i}`);
    info.style.display='block';
    info.textContent=chosen===correct?'✅ Bonne réponse !':'❌ Mauvaise réponse. Bonne réponse : '+q.options[correct];
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  box.innerHTML=`🎯 Votre score : <strong>${score}/${questions.length}</strong> (${pct}%)`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
}

function reset(){
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
}

render();
</script>
</body>
</html>
