<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Business English du jour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#222;padding:16px}
h1{color:#2c5f8a;font-size:1.4em;text-align:center;margin-bottom:6px}
p.subtitle{text-align:center;color:#555;margin-bottom:20px;font-size:.95em}
.q-block{background:#fff;border-radius:8px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.q-label{font-weight:bold;margin-bottom:10px;line-height:1.4}
.option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:6px;margin-bottom:6px;cursor:pointer;border:2px solid #ddd;transition:border-color .2s}
.option:hover{border-color:#2c5f8a}
.option input{cursor:pointer}
.correct{background:#d4edda;border-color:#28a745}
.wrong{background:#f8d7da;border-color:#dc3545}
.feedback{margin-top:10px;font-size:.88em;font-weight:bold}
.feedback.ok{color:#28a745}
.feedback.ko{color:#dc3545}
#score-box{background:#2c5f8a;color:#fff;text-align:center;border-radius:8px;padding:16px;margin-bottom:16px;font-size:1.1em}
button{display:block;width:100%;max-width:340px;margin:0 auto 12px;padding:12px;font-size:1em;border:none;border-radius:8px;cursor:pointer;font-weight:bold}
#btn-validate{background:#2c5f8a;color:#fff}
#btn-validate:hover{background:#1e4570}
#btn-reset{background:#e07b00;color:#fff;display:none}
#btn-reset:hover{background:#b85f00}
</style>
</head>
<body>
<h1>🧠 Quiz Business English du jour</h1>
<p class="subtitle">Everyday Idioms &amp; Colourful Expressions — 6 questions</p>
<div id="quiz"></div>
<div id="score-box" style="display:none"></div>
<button id="btn-validate">Valider mes réponses</button>
<button id="btn-reset">Recommencer</button>
<script>
const questions=[
  {
    q:'Que signifie <em>"to add insult to injury"</em>&nbsp;?',
    opts:["S'excuser après une erreur","Rendre une mauvaise situation encore pire","Accuser quelqu'un injustement","Proposer une solution de remplacement"],
    ans:1
  },
  {
    q:'Quelle expression signifie <em>«&nbsp;quoi qu\'il arrive&nbsp;»</em>&nbsp;?',
    opts:["All things considered","A storm in a teacup","Come rain or shine","Let's get down to business"],
    ans:2
  },
  {
    q:'Complétez la phrase&nbsp;: <em>"Thanks for joining — let\'s ________ to business, we have a lot to cover."</em>',
    opts:["get back","get into","get through","get down"],
    ans:3
  },
  {
    q:'Que signifie <em>"it slipped through the cracks"</em>&nbsp;?',
    opts:["Quelque chose a été délibérément ignoré","Quelque chose a été oublié ou manqué par inadvertance","Quelque chose était trop complexe à gérer","Quelque chose a été mal compris"],
    ans:1
  },
  {
    q:'Vrai ou faux&nbsp;: <em>"A storm in a teacup"</em> décrit une crise véritablement grave qui nécessite une action immédiate.',
    opts:["Vrai","Faux","Ça dépend du contexte","L'expression ne s'utilise pas en business"],
    ans:1
  },
  {
    q:'Quelle expression signifie <em>«&nbsp;être impliqué dans de nombreux projets à la fois&nbsp;»</em>&nbsp;?',
    opts:["To wear many hats","To have a lot on your plate","To have a finger in every pie","To call it a day"],
    ans:2
  }
];

const quizDiv=document.getElementById('quiz');

function render(){
  quizDiv.innerHTML='';
  questions.forEach((q,i)=>{
    const block=document.createElement('div');
    block.className='q-block';
    block.innerHTML=`<div class="q-label">Q${i+1}. ${q.q}</div>`+
      q.opts.map((o,j)=>`<label class="option" id="opt-${i}-${j}"><input type="radio" name="q${i}" value="${j}"> ${o}</label>`).join('')+
      `<div class="feedback" id="fb-${i}"></div>`;
    quizDiv.appendChild(block);
  });
}

document.getElementById('btn-validate').addEventListener('click',()=>{
  let score=0;
  let allAnswered=true;
  questions.forEach((q,i)=>{
    const sel=document.querySelector(`input[name="q${i}"]:checked`);
    if(!sel){allAnswered=false;return;}
    const chosen=parseInt(sel.value);
    const fb=document.getElementById(`fb-${i}`);
    q.opts.forEach((_,j)=>{
      const lbl=document.getElementById(`opt-${i}-${j}`);
      lbl.style.pointerEvents='none';
      if(j===q.ans) lbl.classList.add('correct');
      if(j===chosen && chosen!==q.ans) lbl.classList.add('wrong');
    });
    if(chosen===q.ans){
      score++;
      fb.textContent='✅ Bonne réponse !';
      fb.className='feedback ok';
    } else {
      fb.textContent=`❌ Faux. Bonne réponse : « ${q.opts[q.ans]} »`;
      fb.className='feedback ko';
    }
  });
  if(!allAnswered){alert('Veuillez répondre à toutes les questions avant de valider.');return;}
  const box=document.getElementById('score-box');
  box.style.display='block';
  const pct=Math.round(score/questions.length*100);
  box.innerHTML=`🎯 Votre score : <strong>${score}/${questions.length}</strong> (${pct}%)<br>${score===questions.length?'Parfait ! 🏆':score>=4?'Très bien ! 💪':'Continuez à pratiquer ! 📚'}`;
  document.getElementById('btn-validate').style.display='none';
  document.getElementById('btn-reset').style.display='block';
  box.scrollIntoView({behavior:'smooth'});
});

document.getElementById('btn-reset').addEventListener('click',()=>{
  document.getElementById('score-box').style.display='none';
  document.getElementById('btn-validate').style.display='block';
  document.getElementById('btn-reset').style.display='none';
  render();
  window.scrollTo({top:0,behavior:'smooth'});
});

render();
</script>
</body>
</html>
